  <style>

  @import url('https://fonts.googleapis.com/css2?family=Manuale:ital,wght@0,400;0,600;0,700;1,400&family=Exo+2:wght@300;400;600;700&display=swap');
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    /* ── Brand: use the three brand colors as primary UI ── */
    --lime:       #efe454;
    --lime-dark:  #c8c420;
    --lime-muted: #d8d840;
    --lime-pale:  #fafbe0;
    --sage:       #a0cb7b;
    --sage-dark:  #7ab55e;
    --sage-pale:  #dff0cc;
    --teal:       #68b87d;
    --teal-dark:  #4ea066;
    --teal-pale:  #c8e8d0;

    /* ── Sidebar uses sage as background ── */
    --sidebar-bg:      #4a9e62;
    --sidebar-active:  #ece455;
    --sidebar-hover:   rgba(255,255,255,.12);
    --sidebar-icon:    rgba(255,255,255,.55);

    /* ── Surfaces ── */
    --bg:          #f0faf3;      /* very light sage-tinted page */
    --surface:     #ffffff;
    --surface2:    #f5fbf7;
    --border:      #cce8d4;
    --border2:     #b8ddc4;

    /* ── Text ── */
    --text:        #1a3322;
    --muted:       #5a7a65;

    /* ── Chat bubbles ── */
    --bubble-out:  #3d7a4a;    /* outgoing: dark teal-green */
    --bubble-in:   #ffffff;

    /* ── Accents ── */
    --accent:      #62ba7a;
    --accent2:     #eaed53;
    --danger:      #c0392b;

    --radius:  16px;
    --shadow:  0 2px 16px rgba(62,122,74,.10);
    --shadow2: 0 6px 28px rgba(62,122,74,.14);
  }

  body { font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
  .app { display:flex; height:100vh; overflow:hidden; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }

  /* ══════════════════════════════
     SIDEBAR
  ══════════════════════════════ */
  .sidebar {
    width:80px; background:var(--sidebar-bg);
    display:flex; flex-direction:column; align-items:center;
    padding:18px 0 20px; flex-shrink:0; z-index:10;
  }
  .sb-logo { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:22px; padding:0 8px; }
  .sb-wordmark { font-family:'Exo 2',sans-serif; font-size:.52rem; font-weight:700; color:rgba(255,255,255,.55); text-align:center; letter-spacing:.3px; line-height:1.3; }
  .sb-nav { display:flex; flex-direction:column; gap:4px; width:100%; padding:0 10px; flex:1; }
  .sb-item {
    width:56px; height:48px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .18s,color .18s;
    position:relative; color:var(--sidebar-icon);
  }
  .sb-item:hover { background:var(--sidebar-hover); color:#fff; }
  .sb-item.active { background:var(--sidebar-active); color:var(--text); }
  .sb-item .badge {
    position:absolute; top:7px; right:7px;
    width:14px; height:14px; border-radius:50%;
    background:var(--lime); font-size:.56rem; font-weight:700;
    color:#1a2e22; display:flex; align-items:center; justify-content:center;
  }
  .sb-bottom { padding:0 10px; display:flex; justify-content:center; }
  .sb-avatar {
    width:40px; height:40px; border-radius:50%;
    background:var(--lime); display:flex; align-items:center; justify-content:center;
    font-size:.73rem; color:var(--text); font-weight:700; cursor:pointer;
    border:2px solid rgba(255,255,255,.3); letter-spacing:.5px;
  }

  /* ══════════════════════════════
     PANEL (conversation list)
  ══════════════════════════════ */
  .panel {
    width:300px; flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;
  }
  .panel-header { padding:20px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-title { font-family:'Manuale',serif; font-size:1.2rem; color:var(--text); margin-bottom:10px; }

  .search-wrap { position:relative; }
  .search-input {
    width:100%; padding:8px 12px 8px 34px;
    border:1.5px solid var(--border); border-radius:10px;
    font-family:'Exo 2'; font-size:.82rem;
    background:var(--bg); color:var(--text); transition:border .2s;
  }
  .search-input:focus { outline:none; border-color:var(--teal); background:#fff; }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); display:flex; }

  .new-chat-btn {
    width:100%; margin-top:9px; padding:9px 0; border:none; border-radius:10px;
    background:var(--sage); color:var(--text); font-family:'Exo 2'; font-weight:700;
    font-size:.84rem; cursor:pointer; transition:background .18s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .new-chat-btn:hover { background:var(--sage-dark); }

  .panel-list { flex:1; overflow-y:auto; }
  .conv-row {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; cursor:pointer; border-bottom:1px solid var(--border);
    transition:background .15s;
  }
  .conv-row:hover { background:var(--surface2); }
  .conv-row.active { background:var(--sage-pale); }
  .conv-avatar {
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.86rem; font-weight:700; color:var(--text);
    flex-shrink:0; position:relative; overflow:hidden;
  }
  .conv-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .online-dot { position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:var(--teal); border:2px solid var(--surface); }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-weight:700; font-size:.87rem; color:var(--text); }
  .conv-preview { font-size:.74rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
  .conv-time { font-size:.69rem; color:var(--muted); }
  .conv-unread {
    width:17px; height:17px; border-radius:50%; background:var(--teal);
    color:#fff; font-size:.6rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }

  /* ══════════════════════════════
     CHAT AREA
  ══════════════════════════════ */
  .chat-area {
    flex:1; display:flex; flex-direction:column; min-width:0;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 90%, rgba(157,217,121,.12) 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(234,237,83,.10) 0%, transparent 40%);
  }
  .chat-topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 16px; height:60px; display:flex; align-items:center; gap:12px;
    flex-shrink:0; box-shadow:0 1px 6px rgba(62,122,74,.07);
  }
  .ct-avatar {
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.86rem; font-weight:700; color:var(--text);
    position:relative; overflow:hidden; cursor:pointer; flex-shrink:0;
  }
  .ct-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .ct-name { font-weight:700; font-size:.94rem; color:var(--text); }
  .ct-status { font-size:.72rem; color:var(--muted); display:flex; align-items:center; gap:5px; margin-top:1px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--teal); display:inline-block; flex-shrink:0; }
  .status-dot.off { background:var(--border2); }
  .ct-actions { margin-left:auto; display:flex; gap:5px; }
  .icon-btn {
    width:33px; height:33px; border-radius:9px; border:none;
    background:var(--surface2); color:var(--muted);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s,color .15s;
  }
  .icon-btn:hover { background:var(--sage-pale); color:var(--text); }
  .icon-btn.on { background:var(--lime-pale); color:var(--text); }

  /* Messages */
  .messages { flex:1; overflow-y:auto; padding:20px 24px 24px; display:flex; flex-direction:column; gap:2px; }
  .date-divider {
    text-align:center; margin:12px 0 8px; font-size:.68rem; color:var(--muted);
    font-weight:700; letter-spacing:.5px; text-transform:uppercase; position:relative;
  }
  .date-divider::before,.date-divider::after {
    content:''; position:absolute; top:50%; width:calc(50% - 52px); height:1px; background:var(--border);
  }
  .date-divider::before { left:0; }
  .date-divider::after { right:0; }

  .msg-row { display:flex; margin-bottom:2px; }
  .msg-row.out { justify-content:flex-end; }
  .msg-row.in  { justify-content:flex-start; }
  .msg-bubble-wrap { max-width:65%; }
  .msg-sender { font-size:.68rem; color:var(--teal-dark); font-weight:700; margin-bottom:2px; margin-left:2px; }
  .msg-bubble {
    padding:9px 13px; border-radius:16px;
    font-size:.87rem; line-height:1.52;
    position:relative; display:inline-block; max-width:100%; word-break:break-word;
  }
  .msg-row.in  .msg-bubble { background:var(--bubble-in); color:var(--text); border-bottom-left-radius:4px; box-shadow:0 1px 5px rgba(62,122,74,.10); }
  .msg-row.out .msg-bubble { background:var(--bubble-out); color:#fff; border-bottom-right-radius:4px; }
  .msg-meta { display:flex; align-items:center; gap:4px; margin-top:3px; justify-content:flex-end; }
  .msg-time-small { font-size:.65rem; color:var(--muted); }
  .msg-row.out .msg-time-small { color:rgba(255,255,255,.55); }
  .tick { color:var(--sage); display:flex; align-items:center; }

  /* bubble tails */
  .msg-row.in  .msg-bubble::before { content:''; position:absolute; left:-5px; bottom:0; border:7px solid transparent; border-right-color:var(--bubble-in); border-bottom:0; border-left:0; filter:drop-shadow(-1px 1px 2px rgba(62,122,74,.08)); }
  .msg-row.out .msg-bubble::after  { content:''; position:absolute; right:-5px; bottom:0; border:7px solid transparent; border-left-color:var(--bubble-out); border-bottom:0; border-right:0; }
  .msg-row.in  + .msg-row.in  .msg-bubble { border-top-left-radius:4px; }
  .msg-row.out + .msg-row.out .msg-bubble { border-top-right-radius:4px; }
  .msg-row.in  + .msg-row.in  .msg-bubble::before { display:none; }
  .msg-row.out + .msg-row.out .msg-bubble::after  { display:none; }

  /* image in message */
  .msg-img { width:220px; height:155px; object-fit:cover; border-radius:11px; display:block; cursor:pointer; }
  .msg-img-wrap { margin-bottom:4px; }

  /* Chat input */
  .chat-window { display:flex; flex-direction:column; flex:1; overflow:hidden; max-width:100%; }
  .chat-input-area {
    background:var(--surface); border-top:1px solid var(--border);
    padding:11px 16px; padding-bottom:max(11px,calc(env(safe-area-inset-bottom,0px) + 11px)); display:flex; align-items:flex-end; gap:8px; flex-shrink:0;
  }
  .input-box {
    flex:1; background:var(--bg); border:1.5px solid var(--border);
    border-radius:20px; padding:9px 15px; font-family:'Exo 2'; font-size:.89rem;
    color:var(--text); resize:none; max-height:100px; overflow-y:auto; line-height:1.45; transition:border .2s;
  }
  .input-box:focus { outline:none; border-color:var(--teal); background:#fff; }
  .send-btn {
    width:40px; height:40px; border-radius:50%; border:none;
    background:var(--sage); color:var(--text); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s,transform .1s; flex-shrink:0;
  }
  .send-btn:hover { background:var(--sage-dark); transform:scale(1.05); }
  .send-btn:disabled { background:var(--border); color:var(--muted); transform:none; cursor:default; }
  .attach-btn {
    width:33px; height:33px; border-radius:50%; border:none;
    background:transparent; color:var(--muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:color .15s;
  }
  .attach-btn:hover { color:var(--teal-dark); }

  /* Quick replies */
  .quick-replies { display:flex; gap:6px; flex-wrap:wrap; padding:0 24px 10px; flex-shrink:0; }
  .qr-btn {
    padding:5px 12px; border-radius:18px; border:1.5px solid var(--border);
    background:var(--surface); font-size:.74rem; cursor:pointer;
    color:var(--muted); font-family:'Exo 2'; transition:all .15s;
  }
  .qr-btn:hover { border-color:var(--teal); color:var(--text); background:var(--teal-pale); }

  /* Info bar */
  .info-bar { background:var(--lime-pale); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; gap:20px; font-size:.79rem; color:var(--muted); flex-shrink:0; }
  .info-bar strong { color:var(--text); }

  /* Empty chat */
  .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .empty-chat h3 { font-family:'Manuale',serif; font-size:1.25rem; color:var(--text); opacity:.35; }
  .empty-chat p { font-size:.84rem; opacity:.5; }

  /* Photo panel */
  .photo-panel { background:var(--surface); border-top:1px solid var(--border); padding:12px 18px; flex-shrink:0; }
  .photo-panel-title { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:9px; }
  .photo-grid { display:flex; gap:7px; flex-wrap:wrap; }
  .photo-thumb { width:68px; height:68px; border-radius:9px; object-fit:cover; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
  .photo-thumb:hover { border-color:var(--teal); }
  .photo-add {
    width:68px; height:68px; border-radius:9px; border:2px dashed var(--border2);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; cursor:pointer; color:var(--muted); transition:all .15s; font-size:.65rem; font-weight:700;
  }
  .photo-add:hover { border-color:var(--teal); color:var(--teal-dark); background:var(--teal-pale); }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:99999; display:flex; align-items:center; justify-content:center; }
  .lightbox img { max-width:90vw; max-height:85vh; border-radius:12px; object-fit:contain; }
  .lightbox-close { z-index:99999; position:absolute; top:18px; right:22px; color:#fff; cursor:pointer; opacity:.7; }
  .lightbox-close:hover { opacity:1; }

  /* ══════════════════════════════
     CONTENT PAGES (right side)
  ══════════════════════════════ */
  .content-main { flex:1; overflow-y:auto; padding:32px 36px; background:var(--bg); }
  .page-heading { font-family:'Manuale',serif; font-size:1.7rem; color:var(--text); margin-bottom:4px; }
  .page-sub { font-size:.87rem; color:var(--muted); margin-bottom:24px; }

  .card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin-bottom:16px; }
  .card-title {
    font-family:'Manuale',serif; font-size:1.03rem; color:var(--text);
    margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:9px;
  }

  /* Buttons */
  .btn { padding:8px 18px; border:none; border-radius:10px; cursor:pointer; font-family:'Exo 2'; font-weight:700; font-size:.83rem; transition:all .18s; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--teal); color:#fff; }
  .btn-primary:hover { background:var(--teal-dark); }
  .btn-sage { background:var(--sage); color:var(--text); }
  .btn-sage:hover { background:var(--sage-dark); }
  .btn-lime { background:var(--lime); color:var(--text); }
  .btn-lime:hover { background:var(--lime-dark); }
  .btn-ghost { background:transparent; border:1.5px solid var(--border2); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--teal); color:var(--text); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-sm { padding:4px 10px; font-size:.75rem; }

  /* Forms */
  .label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:block; }
  .input,.textarea,.select {
    width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:10px;
    font-family:'Exo 2'; font-size:.87rem; background:var(--surface); color:var(--text); transition:border .2s;
  }
  .input:focus,.textarea:focus,.select:focus { outline:none; border-color:var(--teal); }
  .textarea { resize:vertical; min-height:74px; }
  .form-row { margin-bottom:12px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

  /* Goals */
  .goal-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .goal-item.done { opacity:.5; }
  .goal-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .goal-title { font-weight:700; font-size:.89rem; }
  .goal-area { font-size:.67rem; padding:2px 8px; border-radius:99px; font-weight:700; }
  .area-eltern { background:var(--teal-pale); color:var(--teal-dark); }
  .area-paar   { background:var(--lime-pale); color:#6b6200; }
  .area-ich    { background:var(--sage-pale); color:#2d6b1f; }
  .progress-bar { height:5px; background:var(--border); border-radius:99px; margin-top:8px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--teal); border-radius:99px; transition:width .4s; }
  .goal-meta { display:flex; justify-content:space-between; align-items:center; margin-top:7px; }
  .goal-date { font-size:.71rem; color:var(--muted); }
  .goal-actions { display:flex; gap:4px; }

  /* Journal */
  .journal-entry { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .je-header { display:flex; justify-content:space-between; margin-bottom:7px; align-items:center; }
  .je-date { font-size:.73rem; color:var(--muted); }
  .je-text { font-size:.87rem; line-height:1.6; white-space:pre-wrap; }
  .mood-row { display:flex; gap:7px; margin-bottom:10px; }
  .mood-btn {
    padding:6px 13px; border-radius:99px; cursor:pointer; border:1.5px solid var(--border);
    font-size:.74rem; font-weight:700; font-family:'Exo 2'; color:var(--muted);
    background:var(--surface2); transition:all .15s;
  }
  .mood-btn.selected { border-color:var(--teal); background:var(--teal); color:#fff; }

  /* Reminders */
  .reminder-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .reminder-item-top { display:flex; justify-content:space-between; align-items:center; }
  .reminder-photos { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .rem-photo { width:60px; height:60px; border-radius:8px; object-fit:cover; cursor:pointer; border:1.5px solid transparent; transition:border-color .15s; }
  .rem-photo:hover { border-color:var(--teal); }
  .rem-photo-add { width:60px; height:60px; border-radius:8px; border:2px dashed var(--border2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; color:var(--muted); font-size:.6rem; font-weight:700; font-family:'Exo 2',sans-serif; transition:all .15s; }
  .rem-photo-add:hover { border-color:var(--teal); color:var(--teal-dark); background:var(--teal-pale); }
  .reminder-left { display:flex; align-items:center; gap:12px; }
  .reminder-icon-wrap { width:36px; height:36px; border-radius:9px; background:var(--sage-pale); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--teal-dark); flex-shrink:0; }
  .reminder-text { font-weight:700; font-size:.86rem; }
  .reminder-time { font-size:.73rem; color:var(--muted); margin-top:1px; }
  .toggle { width:40px; height:22px; background:var(--border2); border-radius:99px; cursor:pointer; position:relative; border:none; transition:background .2s; }
  .toggle.on { background:var(--teal); }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .toggle.on::after { left:21px; }

  /* Icon picker */
  .icon-picker { display:flex; gap:6px; flex-wrap:wrap; }
  .icon-pick-btn { width:38px; height:38px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface2); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .15s; }
  .icon-pick-btn:hover { border-color:var(--teal); color:var(--teal-dark); }
  .icon-pick-btn.selected { border-color:var(--teal); background:var(--sage); color:var(--text); }

  /* Recurrence */
  .rec-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .rec-tab { padding:7px 13px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.81rem; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; }
  .rec-tab:hover { border-color:var(--teal); color:var(--text); }
  .rec-tab.active { border-color:var(--teal); background:var(--sage); color:var(--text); }
  .rec-preview { background:var(--lime-pale); border-left:3px solid var(--lime-dark); border-radius:0 8px 8px 0; padding:11px 13px; font-size:.82rem; color:var(--muted); margin-top:10px; line-height:1.6; }
  .rec-preview strong { color:var(--text); }
  .day-picker { display:flex; gap:5px; }
  .day-btn { width:38px; height:38px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.72rem; cursor:pointer; transition:all .15s; }
  .day-btn.sel { border-color:var(--teal); background:var(--sage); color:var(--text); }
  .mday-grid { display:flex; gap:4px; flex-wrap:wrap; max-width:360px; }
  .mday-btn { width:33px; height:33px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.73rem; cursor:pointer; transition:all .15s; }
  .mday-btn.sel { border-color:var(--teal); background:var(--sage); color:var(--text); }

  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(20,50,30,.3); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--surface); border-radius:var(--radius); padding:20px; padding-bottom:0; box-sizing:border-box; width:calc(100vw - 32px); max-width:460px; min-width:0; max-height:calc(100dvh - 80px); overflow-y:auto; overflow-x:hidden; box-shadow:0 20px 60px rgba(20,60,30,.2); display:flex; flex-direction:column; }
  .modal-title { font-family:'Manuale',serif; font-size:1.15rem; color:var(--text); margin-bottom:16px; }
  .modal-actions { display:flex; gap:8px; justify-content:space-between; flex-shrink:0; background:var(--surface); padding:14px 20px calc(env(safe-area-inset-bottom,0px) + 16px); border-top:2px solid var(--border); margin:0 -20px -0px; margin-top:16px; }

  /* Dashboard stats */
  .stat-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .stat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; border-left:4px solid var(--sage); }
  .stat-card:nth-child(2) { border-left-color:var(--lime); }
  .stat-card:nth-child(3) { border-left-color:var(--teal); }

const readFile = f => new Promise(res => {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX=800, canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res(canvas.toDataURL('image/jpeg',0.75));
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
});

  const [mobileChatOpen,setMobileChatOpen] = useState(false);

  // ── Firebase init & sync ──
  // ── Firebase sync ──
  const uid = user?.uid || null;

  useEffect(() => {
    if(!uid) return;
    const fbDb = window._fb?.db;
    if(!fbDb) return;

    // Seed demo data on first login, then listen for changes
    const remRef = fbDb.collection("reminders");
    const libRef = fbDb.collection("library");
    const doodleRef = fbDb.collection("doodles");

    const restorePhotos = (items) => items.map(r => {
      try {
        const stored = localStorage.getItem('rem_photos_'+r.id);
        if(stored) return {...r, photos:JSON.parse(stored)};
      } catch(e){}
      return r;
    });
    const syncCollection = async (ref, initData, setter, idField) => {
      try {
        const snap = await ref.get();
        if(snap.empty) {
          for(const item of initData) {
            await ref.doc(String(item[idField||"id"])).set({...item, uid});
          }
        } else {
          setter(snap.docs.map(d=>({...d.data(), id:d.id})));
        }
      } catch(e) { console.log("Sync error:", e.message); }
    };

    syncCollection(remRef,    INIT_REMINDERS, setReminders);
    syncCollection(libRef,    INIT_LIBRARY,   setLibrary);
    syncCollection(doodleRef, INIT_DOODLES,   setDoodles);

    // Live listeners
    const unsubRem = remRef.onSnapshot(
      snap => { if(!snap.empty) setReminders(snap.docs.map(d=>({...d.data(),id:d.id}))); },
      ()=>{}
    );
    const unsubLib = libRef.orderBy("createdAt","desc").onSnapshot(
      snap => { if(!snap.empty) setLibrary(snap.docs.map(d=>({...d.data(),id:d.id}))); },
      ()=>{}
    );
    const unsubDoodle = doodleRef.onSnapshot(
      snap => { if(!snap.empty) setDoodles(snap.docs.map(d=>({...d.data(),id:d.id}))); },
      ()=>{}
    );
    return () => { unsubRem(); unsubLib(); unsubDoodle(); };
  }, [uid]);

  // ── Firebase save helpers ──
  const saveReminders = (newRemsOrFn) => {
    setReminders(prev => {
      const newRems = typeof newRemsOrFn === "function" ? newRemsOrFn(prev) : newRemsOrFn;
      const fbDb = window._fb?.db;
      if(fbDb) {
        newRems.forEach(r => { const {photos,...rNoPhotos}=r; fbDb.collection("reminders").doc(String(r.id)).set({...rNoPhotos,uid}).catch(()=>{}); });
        fbDb.collection("reminders").get().then(snap => {
          const ids = newRems.map(r=>String(r.id));
          snap.docs.forEach(d => { if(!ids.includes(d.id)) d.ref.delete().catch(()=>{}); });
        }).catch(()=>{});
      }
      return newRems;
    });
  };

  const saveLibrary = (newLibOrFn) => {
    setLibrary(prev => {
      const newLib = typeof newLibOrFn === "function" ? newLibOrFn(prev) : newLibOrFn;
      const fbDb = window._fb?.db;
      if(fbDb) {
        newLib.forEach(item => fbDb.collection("library").doc(String(item.id)).set({...item,uid}).catch(()=>{}));
        fbDb.collection("library").get().then(snap => {
          const ids = newLib.map(i=>String(i.id));
          snap.docs.forEach(d => { if(!ids.includes(d.id)) d.ref.delete().catch(()=>{}); });
        }).catch(()=>{});
      }
      return newLib;
    });
  };

  const saveDoodles = (newDOrFn) => {
    setDoodles(prev => {
      const newD = typeof newDOrFn === "function" ? newDOrFn(prev) : newDOrFn;
      const fbDb = window._fb?.db;
      if(fbDb) {
        newD.forEach(d => {
          // Convert slots for Firestore (votes keys must be strings)
          const fsDoc = {
            ...d, uid,
            slots: (d.slots||[]).map(s=>({
              dt: s.dt,
              votes: Object.fromEntries(Object.entries(s.votes||{}).map(([k,v])=>[String(k),v]))
            }))
          };
          fbDb.collection("doodles").doc(String(d.id)).set(fsDoc).catch(()=>{});
        });
        fbDb.collection("doodles").get().then(snap => {
          const ids = newD.map(d=>String(d.id));
          snap.docs.forEach(d => { if(!ids.includes(d.id)) d.ref.delete().catch(()=>{}); });
        }).catch(()=>{});
      }
      return newD;
    });
  };

  // ── Firebase save helpers ──

    {id:"reminders", icon:"bell",     label:"Erinnerungen"},
    {id:"library",   icon:"library",  label:"Mediathek"},

    <${Sidebar} page=${page} setPage=${navTo} totalUnread=${totalUnreadVal} user=${user}/>
    <div style=${{flex:1,display:'flex',overflow:'hidden',minWidth:0}}>
      ${page==="dashboard" && html`<${DashboardPage} coachees=${coachees} library=${library} reminders=${reminders} setPage=${navTo} user=${user}/>`}

        <div key=${i.id} class=${"bottom-nav-item"+(page===i.id?" active":"")} onClick=${()=>navTo(i.id)}>

  const toggle   = id => setGoals(gs=>gs.map(g=>g.id===id?{...g,done:!g.done}:g));

                </div>

              </div>
              <input type="range" min="0" max="100" value=${form.progress} onInput=${e=>setForm(f=>({...f,progress:+e.target.value}))} style=${{width:'100%',marginTop:6,accentColor:'var(--teal)'}}/>
            </div>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:18}}>
              <div>
                ${editId&&html`<button style=${{background:"#fff0ef",border:"1.5px solid #f5c0bc",color:"var(--danger)",padding:"7px 14px",borderRadius:10,cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:".82rem",display:"flex",alignItems:"center",gap:6}}

          </div>

    </div>`;

  const fileRef = useRef(null);

  const filtered = (filter==="all"?library:library.filter(i=>i.type===filter)).filter(i=>!searchQ||i.title.toLowerCase().includes(searchQ.toLowerCase())||(i.desc&&i.desc.toLowerCase().includes(searchQ.toLowerCase()))||(i.keywords&&i.keywords.toLowerCase().includes(searchQ.toLowerCase())))
  const TYPES = [{id:"all",label:"Alle",icon:"library"},{id:"audio",label:"Audio",icon:"music"},{id:"video",label:"Video",icon:"video"},{id:"dokus",label:"Dokus",icon:"file"}];

  const handleFile = e => { const f=e.target.files[0]; if(!f)return; const t=f.type.startsWith("audio")?"audio":f.type.startsWith("video")?"video":"dokus"; setForm(v=>({...v,type:t})); };
  const handleDrop = e => { e.preventDefault(); setDrag(false); const f=e.dataTransfer.files[0]; if(!f)return; const t=f.type.startsWith("audio")?"audio":f.type.startsWith("video")?"video":"dokus"; setForm(v=>({...v,type:t})); };
  const save = () => { if(!form.title.trim())return; setShowUpload(false); setForm({title:"",desc:"",type:"audio"}); setLibrary(l=>[{id:Date.now(),...form,uploadedAt:new Date().toLocaleDateString("de-CH")},...l]); };
  const del  = id => setLibrary(l=>l.filter(i=>i.id!==id));
  const BadgeCls = {audio:"badge-audio",video:"badge-video",dokus:"badge-dokus"};
  const ThumbBg  = {audio:"#d8f0e0",video:"#eef7e4",dokus:"#fafbe0",all:"#f0ede8"};
  const TypeIc   = ({type}) => html`<${Ic} name=${type==="audio"?"music":type==="video"?"video":"file"} size=${30}/>`;

  return html`
    <div class="content-main">
      <div class="flex-between">
        <div><h1 class="page-heading">Mediathek</h1><p class="page-sub">Hier findest du Impulse, Übungen und Inspiration für deinen Alltag — zusammengestellt von Diana & Rico.</p></div>
        
      </div>
      
      <div style=${{marginBottom:12}}>
        <input class="input" type="text" placeholder="Inhalte suchen…"
          value=${searchQ} onInput=${e=>setSearchQ(e.target.value)}
          style=${{width:'100%',fontSize:'.88rem',padding:'9px 14px'}}/>
      </div>
      <div class="lib-filter">
        ${TYPES.map(t=>html`<button key=${t.id} class=${"lib-filter-btn"+(filter===t.id?" sel":"")} data-type=${t.id} onClick=${()=>setFilter(t.id)}><${Ic} name=${t.icon} size=${13}/>${t.label}</button>`)}
      </div>
      <div class="lib-grid">
        ${filtered.map(item=>html`
          <div key=${item.id} class="lib-card">
            <div class="lib-thumb" style=${{background:ThumbBg[item.type]||"#f0ede8",borderBottom:"2px solid "+(item.type==="audio"?"#68b87d":item.type==="video"?"#a0cb7b":item.type==="dokus"?"#efe454":"#c4b8a8")}}>
              <div style=${{color:'var(--muted)',opacity:.45}}><${TypeIc} type=${item.type}/></div>
              ${(item.type==="audio"||item.type==="video")&&html`
              <div class="lib-play-overlay" style=${{cursor:"pointer"}} onClick=${()=>{
                if(item.fileUrl) {
                  try {
                    const arr=item.fileUrl.split(',');
                    const mime=arr[0].match(/:(.*?);/)[1];
                    const bstr=atob(arr[1]); let n=bstr.length;
                    const u8=new Uint8Array(n); while(n--)u8[n]=bstr.charCodeAt(n);
                    const blob=new Blob([u8],{type:mime});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    setTimeout(()=>URL.revokeObjectURL(url),30000);
                  } catch(e){ window.open(item.fileUrl,'_blank'); }
                }
              }}>
                <div class="lib-play-btn"><${Ic} name="play" size=${17}/></div>
              </div>`}
              <span class=${"lib-type-badge "+BadgeCls[item.type]}><${Ic} name=${item.type==="audio"?"music":item.type==="video"?"video":"file"} size=${10}/>${item.type==="audio"?"Audio":item.type==="video"?"Video":"Text"}</span>
            </div>
            <div class="lib-card-body" style=${{borderLeft:"3px solid "+(item.type==="audio"?"#68b87d":item.type==="video"?"#a0cb7b":item.type==="dokus"?"#efe454":"#c4b8a8")}}>
              <div class="lib-card-title" style=${{color:"#1a1a1a"}}>${item.title}</div>
              <div class="lib-card-desc" style=${{color:"#444"}}>${item.desc}</div>
              ${item.keywords&&html`<div style=${{marginTop:5,display:'flex',flexWrap:'wrap',gap:4}}>
                ${item.keywords.split(',').map(k=>k.trim()).filter(k=>k).map(k=>html`
                  <span key=${k} style=${{fontSize:'.62rem',background:'var(--sage-pale)',color:'var(--forest)',
                    padding:'2px 7px',borderRadius:99,fontWeight:700}}>#${k}</span>`)}
              </div>`}
              <div class="lib-card-meta">
                <span>${item.duration||""}</span>
                <div style=${{display:'flex',gap:6,alignItems:'center'}}>
                  <span>${item.uploadedAt}</span>
                </div>
              </div>
            </div>
          </div>`)}
      </div>
      ${filtered.length===0&&html`<div style=${{textAlign:'center',padding:'44px',color:'var(--muted)'}}><p>Noch keine Inhalte in dieser Kategorie.</p></div>`}
      ${showUpload&&html`
        <div class="overlay" onClick=${()=>setShowUpload(false)}>
          <div class="modal" style=${{width:500}} onClick=${e=>e.stopPropagation()}>

            <div class="form-row">
              <div class=${"upload-zone"+(drag?" drag":"")} onDragOver=${e=>{e.preventDefault();setDrag(true);}} onDragLeave=${()=>setDrag(false)} onDrop=${handleDrop} onClick=${()=>fileRef.current?.click()}>
                <div style=${{display:'flex',justifyContent:'center',opacity:.5}}><${Ic} name="upload" size=${30}/></div>
                <p>Datei hierher ziehen oder klicken</p>
                <span>Audio · Video · PDF · DOCX</span>
                <input ref=${fileRef} type="file" style=${{display:'none'}} accept="audio/*,video/*,.pdf,.docx,.txt" onChange=${handleFile}/>
              </div>
            </div>
            <div class="form-row"><label class="label">Typ</label>
              <div style=${{display:'flex',gap:7}}>
                ${["audio","video","dokus"].map(t=>html`
                  <button key=${t} onClick=${()=>setForm(f=>({...f,type:t}))}
                    style=${{padding:'7px 14px',borderRadius:10,border:'1.5px solid',fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:'.81rem',cursor:'pointer',display:'flex',alignItems:'center',gap:6,borderColor:form.type===t?'var(--teal)':'var(--border)',background:form.type===t?'var(--sage)':'var(--surface)',color:'var(--text)'}}>
                    <${Ic} name=${t==="audio"?"music":t==="video"?"video":"file"} size=${13}/>
                    ${t==="audio"?"Audio":t==="video"?"Video":"Text"}

              </div>
            </div>

            <div class="form-row"><label class="label">Beschreibung</label><textarea class="textarea" rows=${2} value=${form.desc} onInput=${e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Kurze Beschreibung…"/></div>
            <div class="modal-actions">
              <button class="btn btn-ghost" onClick=${()=>setShowUpload(false)}>Abbrechen</button>
              <button class="btn btn-primary" onClick=${save}><${Ic} name="upload" size=${13}/> Speichern</button>
            </div>
          </div>
        </div>`}
    </div>`;

const REM_AREAS = ["Ich-Sein","Paar-Sein","Eltern-Sein","Allgemein"];
const REM_AREA_COLOR = {
  "Ich-Sein":   {bg:"#d8f0e0",tag:"#b0dfc0",text:"#1a5530",bar:"#68b87d"},
  "Paar-Sein":  {bg:"#eef7e4",tag:"#c8e8a8",text:"#2d5a18",bar:"#a0cb7b"},

  "Allgemein":  {bg:"#f0ede8",tag:"#e0d8d0",text:"#5a5248",bar:"#c4b8a8"},
};
const BLANK_FORM = {
  label:"", icon:"sunrise", sacredSymbol:"", time:"08:00",
  recurrence:"daily", weekdays:[1], monthDays:[1],
  customInterval:1, customUnit:"Tagen", customWeekdays:[],
  photos:[], files:[], area:"Allgemein", timesPerDay:1, additionalTimes:[]
};


const REC_TABS = [
  {id:"daily",   icon:"sun",    label:"Täglich"},
  {id:"weekly",  icon:"repeat", label:"Wöchentlich"},
  {id:"monthly", icon:"calendar",label:"Monatlich"},
  {id:"custom",  icon:"sliders", label:"Benutzerdefiniert"},
];





function RemindersPage({reminders,setReminders}) {
  const [showModal,setShowModal] = useState(false);
  const [editId,setEditId]       = useState(null);
  const [form,setForm]           = useState(BLANK_FORM);
  const [lightbox,setLightbox]   = useState(null);

  const [showSymbolPicker,setShowSymbolPicker] = useState(false);
  const openNew  = () => { setForm(BLANK_FORM); setEditId(null); setShowModal(true); };
  const openEdit = r  => {
    // Restore photos from localStorage if not in Firestore data
    let photos = r.photos||[];
    let files = r.files||[];
    if(photos.length===0) {
      try { const stored=localStorage.getItem('rem_photos_'+r.id); if(stored)photos=JSON.parse(stored); } catch(e){}
    }
    setForm({...BLANK_FORM,...r,photos,files,additionalTimes:r.additionalTimes||[],area:r.area||'Allgemein'});
    setEditId(r.id);
    setShowModal(true);
  };
  const togWD = d => setForm(f=>({...f,weekdays:f.weekdays.includes(d)?f.weekdays.filter(x=>x!==d):[...f.weekdays,d]}));
  const togMD = d => setForm(f=>({...f,monthDays:f.monthDays.includes(d)?f.monthDays.filter(x=>x!==d):[...f.monthDays,d]}));
  const togCD = d => setForm(f=>({...f,customWeekdays:f.customWeekdays.includes(d)?f.customWeekdays.filter(x=>x!==d):[...f.customWeekdays,d]}));

  const addPhotosToReminder = async (id,files) => {
    const urls = await Promise.all(Array.from(files).map(readFile));
    setReminders(rs=>rs.map(r=>r.id===id?{...r,photos:[...(r.photos||[]),...urls]}:r));
  };
  const removeReminderPhoto = (remId,photoIdx) => setReminders(rs=>rs.map(r=>r.id===remId?{...r,photos:(r.photos||[]).filter((_,i)=>i!==photoIdx)}:r));
  const modalPhotoRef = useRef(null);
  const modalFileRef  = useRef(null);
  const handleModalFiles = async e => {
    if(!e.target.files||!e.target.files.length) return;
    const files = Array.from(e.target.files);
    e.target.value = '';
    const results = await Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res({url:ev.target.result, name:f.name, type:f.type});
      r.readAsDataURL(f);
    })));
    setForm(f=>({...f, files:[...(f.files||[]),...results]}));
  };
  const handleModalPhotos = async e => {
    if(!e.target.files||!e.target.files.length) return;
    const urls = await Promise.all(Array.from(e.target.files).map(readFile));
    setForm(f=>({...f, photos:[...(f.photos||[]),...urls]}));
    e.target.value = '';
  };
  const removeModalPhoto = idx => setForm(f=>({...f, photos:(f.photos||[]).filter((_,i)=>i!==idx)}));

  const [saveError,setSaveError] = useState(false);
  const save = () => {
    if(!form.label.trim()){
      setSaveError(true);
      setTimeout(()=>setSaveError(false),2000);
      return;
    }
    setSaveError(false);
    const id = editId||Date.now();
    const entry={...form,id,enabled:true,area:form.area||'Allgemein',additionalTimes:form.additionalTimes||[]};
    // Store photos in localStorage separately (too large for Firestore)
    if(entry.photos&&entry.photos.length>0) {
      try { localStorage.setItem('rem_photos_'+id, JSON.stringify(entry.photos)); } catch(e){}
    } else {
      try { localStorage.removeItem('rem_photos_'+id); } catch(e){}
    }
    setShowModal(false);
    setReminders(rs=>editId?rs.map(r=>r.id===editId?entry:r):[...rs,entry]);
  };

  const preview = () => {
    if(form.recurrence==="daily")   return html`Jeden Tag um <strong>${form.time} Uhr</strong>.`;
    if(form.recurrence==="weekly")  return form.weekdays.length>0?html`Jeden <strong>${form.weekdays.map(d=>WEEKDAY_FULL[d]).join(", ")}</strong> um <strong>${form.time} Uhr</strong>.`:"Bitte Wochentage wählen.";
    if(form.recurrence==="monthly") return form.monthDays.length>0?html`Am <strong>${form.monthDays.slice().sort((a,b)=>a-b).map(d=>d+".").join(", ")}</strong> des Monats um <strong>${form.time} Uhr</strong>.`:"Bitte Tag(e) wählen.";
    if(form.recurrence==="custom")  return html`Alle <strong>${form.customInterval} ${form.customUnit}</strong>${form.customWeekdays.length>0?html` an <strong>${form.customWeekdays.map(d=>DAYS_SHORT[d]).join(", ")}</strong>`:""} um <strong>${form.time} Uhr</strong>.`;
  };

  const groups    = REC_TYPES.map(rt=>({...rt,items:reminders.filter(r=>r.recurrence===rt.id)})).filter(g=>g.items.length>0);
  const ungrouped = reminders.filter(r=>!r.recurrence);

  const Row = ({r}) => {
    const ac = REM_AREA_COLOR[r.area||"Allgemein"] || REM_AREA_COLOR["Allgemein"];
    const extraTimes = r.additionalTimes||[];
    const allTimes = [r.time, ...extraTimes].join(' · ');
    return html`
      <div onClick=${()=>openEdit(r)} style=${{
        background:"var(--surface)",borderRadius:14,marginBottom:8,
        padding:"14px 16px",display:"flex",alignItems:"center",gap:12,
        borderLeft:"3px solid "+ac.bar,
        boxShadow:"0 1px 8px rgba(30,58,47,.07)",
        cursor:"pointer"
      }}>
        <div style=${{
          width:44,height:44,borderRadius:12,background:ac.bg,
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"
        }}>
          ${r.sacredSymbol
            ? html`<span style=${{width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}} dangerouslySetInnerHTML=${{__html:SYMBOLS.find(s=>s.name===r.sacredSymbol)?.svg||""}}/>`
            : html`<${Ic} name=${r.icon||"bell"} size=${20} style=${{color:ac.text}}/>`}
        </div>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontWeight:700,fontSize:".92rem",color:"var(--text)",marginBottom:3,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            ${r.label}
            ${r.area&&r.area!=="Allgemein"&&html`<span style=${{fontSize:".6rem",fontWeight:700,padding:"1px 7px",borderRadius:99,background:ac.tag,color:ac.text}}>${r.area}</span>`}
          </div>
          <div style=${{fontSize:".77rem",color:"var(--muted)"}}>
            ${allTimes} Uhr · ${recLabel(r)}
          </div>

function fmtDt(dt) {
  const d=new Date(dt);
  const days=["So","Mo","Di","Mi","Do","Fr","Sa"];
  const months=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  return days[d.getDay()]+", "+d.getDate()+". "+months[d.getMonth()]+" · "+
    String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+" Uhr";
}
function bestSlotIdx(doodle) {
  let best=-1,bestCount=-1;
  doodle.slots.forEach((s,i)=>{
    const yes=Object.values(s.votes).filter(v=>v==="yes").length;
    if(yes>bestCount){bestCount=yes;best=i;}
  });
  return best;
}
function showToastMsg(msg) {
  const t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),300);},3000);
}

function DoodlePage({doodles,setDoodles,coachees,events}) {
  const [subTab,setSubTab]       = useState("coachee");

  const [showResults,setShowResults] = useState(null);
  const [newTitle,setNewTitle]   = useState("");
  const [newDesc,setNewDesc]     = useState("");
  const [newSlots,setNewSlots]   = useState([]);
  const [newSlotDt,setNewSlotDt] = useState("");
  const [selRecip,setSelRecip]   = useState([]);
  const [coacheeVotes,setCoacheeVotes] = useState({});
  const [submitted,setSubmitted] = useState({});
  const [showConfirmed,setShowConfirmed] = useState(false);

  // ── helpers ──
  const toggleRecip = id => setSelRecip(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);
  const addSlot = () => {
    if(!newSlotDt) return;
    if(newSlots.includes(newSlotDt)) return;
    setNewSlots(s=>[...s,newSlotDt].sort());
    // advance 2h
    const d=new Date(newSlotDt); d.setHours(d.getHours()+2);
    setNewSlotDt(d.toISOString().slice(0,16));
  };
  const removeSlot = dt => setNewSlots(s=>s.filter(x=>x!==dt));

  const createDoodle = () => {
    if(!newTitle.trim()||newSlots.length<1) return;
    const nd={id:Date.now(),title:newTitle.trim(),desc:newDesc.trim()||"Bitte wähle die Zeiten die dir passen.",
      status:"open",recipients:[...selRecip],slots:newSlots.map(dt=>({dt,votes:{}}))};
    setShowCreate(false); setNewTitle(""); setNewDesc(""); setNewSlots([]); setSelRecip([]);
    setDoodles(ds=>[nd,...ds]);
    showToastMsg("✓ Terminvorschlag erstellt und gesendet");

    setCoacheeVotes(cv=>{

      return {...cv,[did]:dv};

                <div style=${{fontFamily:"'Manuale',serif",fontSize:"1.05rem",fontWeight:700,color:"var(--text)",marginBottom:4}}>${d.title}</div>
                <div style=${{fontSize:".83rem",color:"var(--muted)",marginBottom:14}}>${d.desc}</div>
                ${d.slots.map((s,i)=>{
                  const v=(coacheeVotes[d.id]||{})[i];
                  return html`
                    <div key=${i} class=${"vote-row-c"+(v==="yes"?" sel-yes":v==="no"?" sel-no":"")}>

                        <div style=${{fontWeight:700,fontSize:".88rem",color:"var(--text)"}}>${fmtDt(s.dt).split("·")[0].trim()}</div>
                        <div style=${{fontSize:".74rem",color:"var(--muted)"}}>${fmtDt(s.dt).split("·")[1]?.trim()}</div>
                      </div>
                      <div style=${{display:"flex",gap:6}}>
                        <button class=${"vbtn yes"+(v==="yes"?" on":"")} onClick=${()=>castVote(d.id,i,"yes")}>✓</button>
                        <button class=${"vbtn no"+(v==="no"?" on":"")} onClick=${()=>castVote(d.id,i,"no")}>✕</button>
                      </div>
                    </div>`;
                })}

              `}
          </div>`)}
        ${doodles.filter(d=>d.recipients.includes(1)).length===0&&html`<div style=${{textAlign:"center",padding:"32px",color:"var(--muted)"}}><p>Keine offenen Terminvorschläge.</p></div>`}
      `}

      ${subTab==="events" && html`
        ${events.map(e=>html`
          <div key=${e.id} class="event-card-row">
            <div class="event-date-blk" style=${{background:e.color}}>

                  Anmelden →

              </div>
              <div class="event-bar"><div class="event-bar-fill" style=${{background:e.color,width:Math.round(e.registered/e.spots*100)+"%"}}/></div>

        <div class="overlay" onClick=${e=>{if(e.target===e.currentTarget)setShowCreate(false);}}>

// ── LOGIN PAGE ──
function LoginPage({ onLogin }) {
  const [mode,setMode]       = useState("login"); // login | register
  const [email,setEmail]     = useState("");
  const [password,setPassword] = useState("");
  const [error,setError]     = useState("");
  const [loading,setLoading] = useState(false);

  const handleEmail = async () => {
    if(!email||!password){ setError("Bitte E-Mail und Passwort eingeben."); return; }
    setLoading(true); setError("");
    try {
      const fbAuth = window._fb?.auth || window.firebase?.auth();
      if(!fbAuth) {
        setError("App wird geladen... Bitte warte kurz und versuche es nochmals.");
        setLoading(false);
        return;
      }
      if(mode==="login") {
        await fbAuth.signInWithEmailAndPassword(email, password);
      } else {
        await fbAuth.createUserWithEmailAndPassword(email, password);
      }
    } catch(e) {
      const msgs = {
        "auth/invalid-credential":"E-Mail oder Passwort falsch.",
        "auth/user-not-found":"Kein Konto mit dieser E-Mail gefunden.",
        "auth/wrong-password":"Falsches Passwort.",
        "auth/email-already-in-use":"Diese E-Mail ist bereits registriert.",
        "auth/weak-password":"Passwort muss mindestens 6 Zeichen haben.",
        "auth/invalid-email":"Ungültige E-Mail-Adresse.",
        "auth/network-request-failed":"Keine Internetverbindung.",
        "auth/too-many-requests":"Zu viele Versuche. Bitte warte kurz.",
      };
      setError(msgs[e.code] || "Fehler ("+e.code+"): "+e.message);
    }
    setLoading(false);
  };

  const handleGoogle = async () => {
    setLoading(true); setError("");
    try {
      const fbAuth = window._fb?.auth || window.firebase?.auth();
      const provider = window._fb?.googleProvider || new window.firebase.auth.GoogleAuthProvider();
      if(!fbAuth) throw {code:"no-auth", message:"Firebase nicht bereit"};
      // Use redirect on mobile, popup on desktop
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if(isMobile) {
        await fbAuth.signInWithRedirect(provider);
      } else {
        await fbAuth.signInWithPopup(provider);
      }
    } catch(e) {
      if(e.code === "auth/cancelled-popup-request" || e.code === "auth/popup-closed-by-user") {
        setError("");
      } else {
        setError("Google fehlgeschlagen: "+e.message);
      }
      setLoading(false);
    }
  };

  return html`
    <div style=${{
      minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"var(--bg)", padding:"24px"
    }}>
      <div style=${{
        background:"var(--surface)", borderRadius:20, padding:"36px 32px",
        width:"100%", maxWidth:400, boxShadow:"0 8px 40px rgba(30,58,47,.12)"
      }}>
        <!-- Logo -->
        <div style=${{textAlign:"center", marginBottom:28}}>
          <${Wordmark} dark=${true} height=${52}/>
        </div>

        <h2 style=${{fontFamily:"'Manuale',serif",fontSize:"1.3rem",color:"var(--text)",marginBottom:6,textAlign:"center"}}>
          ${mode==="login"?"Willkommen zurück":"Konto erstellen"}
        </h2>
        <p style=${{fontSize:".84rem",color:"var(--muted)",textAlign:"center",marginBottom:24}}>
          ${mode==="login"?"Melde dich mit deinem Konto an":"Erstelle deinen persönlichen Zugang"}
        </p>

        ${error && html`<div style=${{background:"#fff0ef",border:"1px solid #f5c0bc",borderRadius:10,padding:"10px 14px",fontSize:".83rem",color:"var(--danger)",marginBottom:14}}>${error}</div>`}

        <!-- Google Button -->
        <button onClick=${handleGoogle} disabled=${loading}
          style=${{width:"100%",padding:"11px",borderRadius:10,border:"1.5px solid var(--border)",background:"var(--surface)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:".88rem",color:"var(--text)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:14,transition:"all .15s"}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Mit Google anmelden
        </button>

        <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style=${{flex:1,height:1,background:"var(--border)"}}/>
          <span style=${{fontSize:".75rem",color:"var(--muted)"}}>oder</span>
          <div style=${{flex:1,height:1,background:"var(--border)"}}/>
        </div>

        <!-- Email -->
        <div style=${{marginBottom:10}}>
          <label style=${{fontSize:".72rem",fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",display:"block",marginBottom:5}}>E-Mail</label>
          <input class="input" type="email" value=${email} onInput=${e=>setEmail(e.target.value)}
            placeholder="deine@email.ch" style=${{width:"100%"}}/>
        </div>
        <div style=${{marginBottom:18}}>
          <label style=${{fontSize:".72rem",fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".5px",display:"block",marginBottom:5}}>Passwort</label>
          <input class="input" type="password" value=${password} onInput=${e=>setPassword(e.target.value)}
            placeholder="••••••••" style=${{width:"100%"}}
            onKeyDown=${e=>e.key==="Enter"&&handleEmail()}/>
        </div>

        <button onClick=${handleEmail} disabled=${loading}
          style=${{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"var(--teal)",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:".92rem",transition:"all .15s",opacity:loading?.6:1}}>
          ${loading?"Wird geladen…":mode==="login"?"Anmelden":"Registrieren"}
        </button>

        <p style=${{textAlign:"center",marginTop:16,fontSize:".82rem",color:"var(--muted)"}}>
          ${mode==="login"?"Noch kein Konto?":"Bereits ein Konto?"}
          <button onClick=${()=>{setMode(mode==="login"?"register":"login");setError("");}}
            style=${{background:"none",border:"none",cursor:"pointer",color:"var(--teal-dark)",fontWeight:700,fontFamily:"'Exo 2',sans-serif",fontSize:".82rem",marginLeft:4}}>
            ${mode==="login"?"Registrieren":"Anmelden"}
          </button>
        </p>
        ${mode==="login" && html`<p style=${{textAlign:"center",marginTop:8,fontSize:".78rem"}}>
          <button onClick=${()=>{
            if(!email){setError("Bitte zuerst E-Mail eingeben.");return;}
            const fbAuth=window._fb?.auth||window.firebase?.auth();
            if(fbAuth){
              fbAuth.sendPasswordResetEmail(email)
                .then(()=>alert("Reset-E-Mail gesendet an: "+email))
                .catch(e=>setError("Fehler: "+e.message));
            } else {
              setError("Firebase nicht bereit — bitte Seite neu laden.");
            }
          }} style=${{background:"none",border:"none",cursor:"pointer",color:"var(--teal-dark)",fontFamily:"'Exo 2',sans-serif",fontSize:".78rem",textDecoration:"underline",fontWeight:600}}>
            Passwort vergessen?
          </button>
        </p>`}
      </div>
    </div>`;
}

// ── ROOT WITH AUTH ──
function Root() {
  const [user,setUser]     = useState(null);
  const [authReady,setAuthReady] = useState(false);

  useEffect(() => {
    // Wait for Firebase to initialize
    let unsubscribe = null;
    const tryAuth = (attempts) => {
      const fbAuth = window._fb?.auth;
      if(fbAuth) {
        unsubscribe = fbAuth.onAuthStateChanged(u => {
          setUser(u);
          setAuthReady(true);
        });
      } else if(attempts < 20) {
        setTimeout(() => tryAuth(attempts + 1), 300);
      } else {
        // Firebase failed to load - show app anyway
        setAuthReady(true);
      }
    };
    tryAuth(0);
    return () => { if(unsubscribe) unsubscribe(); };
  }, []);

  if(!authReady) return html`
    <div style=${{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"var(--bg)"}}>
      <${Wordmark} dark=${true} height=${52}/>
      <div style=${{width:36,height:36,borderRadius:"50%",border:"3px solid var(--border)",borderTopColor:"var(--teal)",animation:"spin .8s linear infinite"}}/>
    </div>`;

  if(!user) return html`<${LoginPage}/>`;

  return html`<${App} user=${user}/>`;
}
