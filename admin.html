<!DOCTYPE html>
<html lang="de">
<head>

<meta http-equiv="Expires" content="0"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Admin"/>
<meta name="theme-color" content="#4a9e62"/>
<title>Admin — Raum für Selbstwirksamkeit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manuale:wght@400;600;700&family=Exo+2:wght@400;600;700&display=swap"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script>
// Auto-reload when app comes back to foreground
    document.addEventListener('visibilitychange', function() {
      if(document.visibilityState === 'visible') {
        const now = Date.now();
        const last = parseInt(sessionStorage.getItem('lastVisible') || now);
        if(now - last > 1 * 60 * 1000) window.location.reload(true);
        sessionStorage.setItem('lastVisible', now);
      } else {
        sessionStorage.setItem('lastVisible', Date.now());
      }
    });

    function initFB() {
  if(typeof firebase === 'undefined') {
    setTimeout(initFB, 200);
    return;
  }
  try {
    if(!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDTopI1AenTGuXWi2ubFm1Y-U5FjOCMy9o",
        authDomain: "selbstwirksamkeits-app.firebaseapp.com",
        projectId: "selbstwirksamkeits-app",
        storageBucket: "selbstwirksamkeits-app.firebasestorage.app",
        messagingSenderId: "887832641738",
        appId: "1:887832641738:web:283828b319d4feace03433"
      });
    }
    window._fb = {
      auth: firebase.auth(),
      db:   firebase.firestore(),
      googleProvider: new firebase.auth.GoogleAuthProvider()
    };
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  } catch(e) {
    console.error("Firebase init:", e);
    setTimeout(initFB, 500);
  }
}
if(document.readyState === 'complete') initFB();
else window.addEventListener('load', initFB);
</script>
<style>


  @import url('https://fonts.googleapis.com/css2?family=Manuale:ital,wght@0,400;0,600;0,700;1,400&family=Exo+2:wght@300;400;600;700&display=swap');
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    /* ── Brand: use the three brand colors as primary UI ── */
    --lime:       #efe454;
    --lime-dark:  #c8c420;
    --lime-muted: #d8d840;
    --lime-pale:  #fafbe0;
    --sage:       #a0cb7b;
    --sage-dark:  #7ab55e;
    --sage-pale:  #dff0cc;
    --teal:       #68b87d;
    --teal-dark:  #4ea066;
    --teal-pale:  #c8e8d0;

    /* ── Sidebar uses sage as background ── */
    --sidebar-bg:      #4a9e62;
    --sidebar-active:  #ece455;
    --sidebar-hover:   rgba(255,255,255,.12);
    --sidebar-icon:    rgba(255,255,255,.55);

    /* ── Surfaces ── */
    --bg:          #f0faf3;      /* very light sage-tinted page */
    --surface:     #ffffff;
    --surface2:    #f5fbf7;
    --border:      #cce8d4;
    --border2:     #b8ddc4;

    /* ── Text ── */
    --text:        #1a3322;
    --muted:       #5a7a65;

    /* ── Chat bubbles ── */
    --bubble-out:  #3d7a4a;    /* outgoing: dark teal-green */
    --bubble-in:   #ffffff;

    /* ── Accents ── */
    --accent:      #62ba7a;
    --accent2:     #eaed53;
    --danger:      #c0392b;

    --radius:  16px;
    --shadow:  0 2px 16px rgba(62,122,74,.10);
    --shadow2: 0 6px 28px rgba(62,122,74,.14);
  }

  body { font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
  .app { display:flex; height:100vh; overflow:hidden; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }

  /* ══════════════════════════════
     SIDEBAR
  ══════════════════════════════ */
  .sidebar {
    width:80px; background:var(--sidebar-bg);
    display:flex; flex-direction:column; align-items:center;
    padding:18px 0 20px; flex-shrink:0; z-index:10;
  }
  .sb-logo { display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:22px; padding:0 8px; }
  .sb-wordmark { font-family:'Exo 2',sans-serif; font-size:.52rem; font-weight:700; color:rgba(255,255,255,.55); text-align:center; letter-spacing:.3px; line-height:1.3; }
  .sb-nav { display:flex; flex-direction:column; gap:4px; width:100%; padding:0 10px; flex:1; }
  .sb-item {
    width:56px; height:48px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .18s,color .18s;
    position:relative; color:var(--sidebar-icon);
  }
  .sb-item:hover { background:var(--sidebar-hover); color:#fff; }
  .sb-item.active { background:var(--sidebar-active); color:var(--text); }
  .sb-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    min-width: 16px;
    height: 16px;
    border-radius: 99px;
    padding: 0 4px;
    background: #efe454;
    color: #1a3322;
    font-size: .55rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--sidebar-bg);
    box-sizing: border-box;
  }
  .sb-item.active .sb-badge {
    background: #a0cb7b;
    border-color: #ece455;
  }
  .sb-item .badge {
    position:absolute; top:7px; right:7px;
    width:14px; height:14px; border-radius:50%;
    background:var(--lime); font-size:.56rem; font-weight:700;
    color:#1a2e22; display:flex; align-items:center; justify-content:center;
  }
  .sb-bottom { padding:0 10px; display:flex; justify-content:center; }
  .sb-avatar {
    width:40px; height:40px; border-radius:50%;
    background:var(--lime); display:flex; align-items:center; justify-content:center;
    font-size:.73rem; color:var(--text); font-weight:700; cursor:pointer;
    border:2px solid rgba(255,255,255,.3); letter-spacing:.5px;
  }

  /* ══════════════════════════════
     PANEL (conversation list)
  ══════════════════════════════ */
  .panel {
    width:300px; flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden;
  }
  .panel-header { padding:20px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-title { font-family:'Manuale',serif; font-size:1.2rem; color:var(--text); margin-bottom:10px; }

  .search-wrap { position:relative; }
  .search-input {
    width:100%; padding:8px 12px 8px 34px;
    border:1.5px solid var(--border); border-radius:10px;
    font-family:'Exo 2'; font-size:.82rem;
    background:var(--bg); color:var(--text); transition:border .2s;
  }
  .search-input:focus { outline:none; border-color:var(--teal); background:#fff; }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); display:flex; }

  .new-chat-btn {
    width:100%; margin-top:9px; padding:9px 0; border:none; border-radius:10px;
    background:var(--sage); color:var(--text); font-family:'Exo 2'; font-weight:700;
    font-size:.84rem; cursor:pointer; transition:background .18s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .new-chat-btn:hover { background:var(--sage-dark); }

  .panel-list { flex:1; overflow-y:auto; }
  .conv-row {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; cursor:pointer; border-bottom:1px solid var(--border);
    transition:background .15s;
  }
  .conv-row:hover { background:var(--surface2); }
  .conv-row.active { background:var(--sage-pale); }
  .conv-avatar {
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.86rem; font-weight:700; color:var(--text);
    flex-shrink:0; position:relative; overflow:hidden;
  }
  .conv-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .online-dot { position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:var(--teal); border:2px solid var(--surface); }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-weight:700; font-size:.87rem; color:var(--text); }
  .conv-preview { font-size:.74rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
  .conv-time { font-size:.69rem; color:var(--muted); }
  .conv-unread {
    width:17px; height:17px; border-radius:50%; background:var(--teal);
    color:#fff; font-size:.6rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }

  /* ══════════════════════════════
     CHAT AREA
  ══════════════════════════════ */
  .chat-area {
    flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 90%, rgba(157,217,121,.12) 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(234,237,83,.10) 0%, transparent 40%);
  }
  .chat-topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 16px; height:64px; display:flex; align-items:center; gap:12px;
    flex-shrink:0; box-shadow:0 1px 6px rgba(62,122,74,.07);
  }
  .ct-avatar {
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:.86rem; font-weight:700; color:var(--text);
    position:relative; overflow:hidden; cursor:pointer; flex-shrink:0;
  }
  .ct-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .ct-name { font-weight:700; font-size:.94rem; color:var(--text); }
  .ct-status { font-size:.72rem; color:var(--muted); display:flex; align-items:center; gap:5px; margin-top:1px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--teal); display:inline-block; flex-shrink:0; }
  .status-dot.off { background:var(--border2); }
  .ct-actions { margin-left:auto; display:flex; gap:5px; }
  .icon-btn {
    width:33px; height:33px; border-radius:9px; border:none;
    background:var(--surface2); color:var(--muted);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s,color .15s;
  }
  .icon-btn:hover { background:var(--sage-pale); color:var(--text); }
  .icon-btn.on { background:var(--lime-pale); color:var(--text); }

  /* Messages */

  .date-divider {
    text-align:center; margin:12px 0 8px; font-size:.68rem; color:var(--muted);
    font-weight:700; letter-spacing:.5px; text-transform:uppercase; position:relative;
  }
  .date-divider::before,.date-divider::after {
    content:''; position:absolute; top:50%; width:calc(50% - 52px); height:1px; background:var(--border);
  }
  .date-divider::before { left:0; }
  .date-divider::after { right:0; }

  .msg-row { display:flex; margin-bottom:2px; }
  .msg-row.out { justify-content:flex-end; }
  .msg-row.in  { justify-content:flex-start; }
  .msg-bubble-wrap { max-width:65%; }
  .msg-sender { font-size:.68rem; color:var(--teal-dark); font-weight:700; margin-bottom:2px; margin-left:2px; }
  .msg-bubble {
    padding:9px 13px; border-radius:16px;
    font-size:.87rem; line-height:1.52;
    display:inline-block; max-width:100%; word-break:break-word;
  }
  .msg-row.in  .msg-bubble { background:#ffffff; color:var(--text); border:1px solid rgba(0,0,0,.08); box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .msg-row.out .msg-bubble { background:var(--bubble-out); color:#fff; }
  .msg-meta { display:flex; align-items:center; gap:4px; margin-top:3px; justify-content:flex-end; }
  .msg-time-small { font-size:.65rem; color:var(--muted); }
  .msg-row.out .msg-time-small { color:rgba(255,255,255,.55); }

    /* image in message */
  .msg-img { width:220px; height:155px; object-fit:cover; border-radius:11px; display:block; cursor:pointer; }
  .msg-img-wrap { margin-bottom:4px; }

  /* Chat */
  .chat-area {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: var(--bg);
  }
  .chat-topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 1px 6px rgba(62,122,74,.07);
  }
  .messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .chat-input-area {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .input-box {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 9px 15px;
    font-family: 'Exo 2';
    font-size: .89rem;
    color: var(--text);
    resize: none;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.45;
    transition: border .2s;
  }
  .input-box:focus { outline: none; border-color: var(--teal); background: #fff; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--sage); color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--sage-dark); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); color: var(--muted); transform: none; cursor: default; }
  .attach-btn {
    width: 33px; height: 33px; border-radius: 50%; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s; flex-shrink: 0;
  }
  .attach-btn:hover { color: var(--teal-dark); }

  /* Quick replies */
  .quick-replies { display:flex; gap:6px; flex-wrap:wrap; padding:0 24px 10px; flex-shrink:0; }
  .qr-btn {
    padding:5px 12px; border-radius:18px; border:1.5px solid var(--border);
    background:var(--surface); font-size:.74rem; cursor:pointer;
    color:var(--muted); font-family:'Exo 2'; transition:all .15s;
  }
  .qr-btn:hover { border-color:var(--teal); color:var(--text); background:var(--teal-pale); }

  /* Info bar */
  .info-bar { background:var(--lime-pale); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; gap:20px; font-size:.79rem; color:var(--muted); flex-shrink:0; }
  .info-bar strong { color:var(--text); }

  /* Empty chat */
  .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .empty-chat h3 { font-family:'Manuale',serif; font-size:1.25rem; color:var(--text); opacity:.35; }
  .empty-chat p { font-size:.84rem; opacity:.5; }

  /* Photo panel */
  .photo-panel { background:var(--surface); border-top:1px solid var(--border); padding:12px 18px; flex-shrink:0; }
  .photo-panel-title { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:9px; }
  .photo-grid { display:flex; gap:7px; flex-wrap:wrap; }
  .photo-thumb { width:68px; height:68px; border-radius:9px; object-fit:cover; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
  .photo-thumb:hover { border-color:var(--teal); }
  .photo-add {
    width:68px; height:68px; border-radius:9px; border:2px dashed var(--border2);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; cursor:pointer; color:var(--muted); transition:all .15s; font-size:.65rem; font-weight:700;
  }
  .photo-add:hover { border-color:var(--teal); color:var(--teal-dark); background:var(--teal-pale); }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:99999; display:flex; align-items:center; justify-content:center; }
  .lightbox img { max-width:90vw; max-height:85vh; border-radius:12px; object-fit:contain; }
  /* lightbox-close now inline */

  /* ══════════════════════════════
     CONTENT PAGES (right side)
  ══════════════════════════════ */
  
  .page-heading { font-family:'Manuale',serif; font-size:1.7rem; color:var(--text); margin-bottom:4px; }
  .page-sub { font-size:.87rem; color:var(--muted); margin-bottom:24px; }

  .card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin-bottom:16px; }
  .card-title {
    font-family:'Manuale',serif; font-size:1.03rem; color:var(--text);
    margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:9px;
  }

  /* Buttons */
  .btn { padding:8px 18px; border:none; border-radius:10px; cursor:pointer; font-family:'Exo 2'; font-weight:700; font-size:.83rem; transition:all .18s; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--teal); color:#fff; }
  .btn-primary:hover { background:var(--teal-dark); }
  .btn-sage { background:var(--sage); color:var(--text); }
  .btn-sage:hover { background:var(--sage-dark); }
  .btn-lime { background:var(--lime); color:var(--text); }
  .btn-lime:hover { background:var(--lime-dark); }
  .btn-ghost { background:transparent; border:1.5px solid var(--border2); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--teal); color:var(--text); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-sm { padding:4px 10px; font-size:.75rem; }

  /* Forms */
  .label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:block; }
  .input,.textarea,.select {
    width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:10px;
    font-family:'Exo 2'; font-size:.87rem; background:var(--surface); color:var(--text); transition:border .2s;
  }
  .input:focus,.textarea:focus,.select:focus { outline:none; border-color:var(--teal); }
  .textarea { resize:vertical; min-height:74px; }
  .form-row { margin-bottom:12px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

  /* Goals */
  .goal-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .goal-item.done { opacity:.5; }
  .goal-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .goal-title { font-weight:700; font-size:.89rem; }
  .goal-area { font-size:.67rem; padding:2px 8px; border-radius:99px; font-weight:700; }
  .area-eltern { background:var(--teal-pale); color:var(--teal-dark); }
  .area-paar   { background:var(--lime-pale); color:#6b6200; }
  .area-ich    { background:var(--sage-pale); color:#2d6b1f; }
  .progress-bar { height:5px; background:var(--border); border-radius:99px; margin-top:8px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--teal); border-radius:99px; transition:width .4s; }
  .goal-meta { display:flex; justify-content:space-between; align-items:center; margin-top:7px; }
  .goal-date { font-size:.71rem; color:var(--muted); }
  .goal-actions { display:flex; gap:4px; }

  /* Journal */
  .journal-entry { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .je-header { display:flex; justify-content:space-between; margin-bottom:7px; align-items:center; }
  .je-date { font-size:.73rem; color:var(--muted); }
  .je-text { font-size:.87rem; line-height:1.6; white-space:pre-wrap; }
  .mood-row { display:flex; gap:7px; margin-bottom:10px; }
  .mood-btn {
    padding:6px 13px; border-radius:99px; cursor:pointer; border:1.5px solid var(--border);
    font-size:.74rem; font-weight:700; font-family:'Exo 2'; color:var(--muted);
    background:var(--surface2); transition:all .15s;
  }
  .mood-btn.selected { border-color:var(--teal); background:var(--teal); color:#fff; }

  /* Reminders */
  .reminder-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }

  .rem-photo { width:60px; height:60px; border-radius:8px; object-fit:cover; cursor:pointer; border:1.5px solid transparent; transition:border-color .15s; }
  .rem-photo:hover { border-color:var(--teal); }
  .rem-photo-add { width:60px; height:60px; border-radius:8px; border:2px dashed var(--border2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; color:var(--muted); font-size:.6rem; font-weight:700; font-family:'Exo 2',sans-serif; transition:all .15s; }
  .rem-photo-add:hover { border-color:var(--teal); color:var(--teal-dark); background:var(--teal-pale); }
  .reminder-left { display:flex; align-items:center; gap:12px; }

  .reminder-time { font-size:.73rem; color:var(--muted); margin-top:1px; }
  .toggle { width:40px; height:22px; background:var(--border2); border-radius:99px; cursor:pointer; position:relative; border:none; transition:background .2s; }
  .toggle.on { background:var(--teal); }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .toggle.on::after { left:21px; }

  /* Icon picker */
  .icon-picker { display:flex; gap:6px; flex-wrap:wrap; }
  .icon-pick-btn { width:38px; height:38px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface2); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .15s; }
  .icon-pick-btn:hover { border-color:var(--teal); color:var(--teal-dark); }
  .icon-pick-btn.selected { border-color:var(--teal); background:var(--sage); color:var(--text); }

  /* Recurrence */
  .rec-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .rec-tab { padding:7px 13px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.81rem; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; }
  .rec-tab:hover { border-color:var(--teal); color:var(--text); }
  .rec-tab.active { border-color:var(--teal); background:var(--sage); color:var(--text); }
  .rec-preview { background:var(--lime-pale); border-left:3px solid var(--lime-dark); border-radius:0 8px 8px 0; padding:11px 13px; font-size:.82rem; color:var(--muted); margin-top:10px; line-height:1.6; }

  .day-picker { display:flex; gap:5px; }
  .day-btn { width:38px; height:38px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.72rem; cursor:pointer; transition:all .15s; }

  .mday-grid { display:flex; gap:4px; flex-wrap:wrap; max-width:360px; }
  .mday-btn { width:33px; height:33px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.73rem; cursor:pointer; transition:all .15s; }
  .mday-btn.sel { border-color:var(--teal); background:var(--sage); color:var(--text); }

  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(20,50,30,.3); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--surface); border-radius:var(--radius); padding:20px; padding-bottom:0; box-sizing:border-box; width:calc(100vw - 32px); max-width:460px; min-width:0; max-height:calc(100dvh - 80px); overflow-y:auto; overflow-x:hidden; box-shadow:0 20px 60px rgba(20,60,30,.2); display:flex; flex-direction:column; }

  .modal-actions { display:flex; gap:8px; justify-content:space-between; flex-shrink:0; background:var(--surface); padding:14px 20px calc(env(safe-area-inset-bottom,0px) + 16px); border-top:2px solid var(--border); margin:0 -20px -0px; margin-top:16px; }

  /* Dashboard stats */
  .stat-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .stat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; border-left:4px solid var(--sage); }
  .stat-card:nth-child(2) { border-left-color:var(--lime); }
  .stat-card:nth-child(3) { border-left-color:var(--teal); }
  .stat-card:nth-child(4) { border-left-color:var(--sage-dark); }
  .stat-label { font-size:.69rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .stat-value { font-family:'Manuale',serif; font-size:1.75rem; color:var(--text); margin-top:2px; }
  .stat-hint { font-size:.74rem; color:var(--teal-dark); margin-top:2px; }

  .quote-block { background:var(--sage); border-radius:var(--radius); padding:20px 24px; margin-bottom:18px; position:relative; overflow:hidden; text-align:center; }
  .quote-block::before { content:''; }
  .quote-text { font-family:'Manuale',serif; font-size:1.15rem; font-style:italic; line-height:1.65; color:var(--text); text-align:center; }

  /* Section label */
  .section-label { font-size:.69rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; margin-top:2px; display:flex; align-items:center; gap:7px; }
  .section-label-line { flex:1; height:1px; background:var(--border); }

  /* Info tip */
  .info-tip { border-radius:var(--radius); padding:13px 16px; margin-bottom:16px; font-size:.83rem; line-height:1.65; display:flex; align-items:flex-start; gap:11px; }
  .info-tip-lime { background:var(--lime-pale); border-left:3px solid var(--lime-dark); color:var(--text); }
  .info-tip-sage { background:var(--sage-pale); border-left:3px solid var(--sage-dark); color:var(--text); }

  /* Library */
  .lib-filter { display:flex; gap:7px; margin-bottom:18px; flex-wrap:wrap; }
  .lib-filter-btn { padding:6px 14px; border-radius:99px; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Exo 2'; font-weight:700; font-size:.79rem; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; }
  .lib-filter-btn.sel               { border-color:#c4b8a8; background:#c4b8a8; color:#3a3028; }
  .lib-filter-btn[data-type="audio"].sel { border-color:#68b87d; background:#68b87d; color:white; }
  .lib-filter-btn[data-type="video"].sel { border-color:#a0cb7b; background:#a0cb7b; color:#1e3a2f; }
  .lib-filter-btn[data-type="dokus"].sel { border-color:#efe454; background:#efe454; color:#5a4800; }
  /* All filter buttons use same forest color when selected */
  .lib-filter-btn:hover { border-color:var(--teal); }
  .lib-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:20px; }
  .lib-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:transform .15s,box-shadow .15s; }
  .lib-card:hover { transform:translateY(-2px); box-shadow:var(--shadow2); }
  .lib-thumb { width:100%; height:130px; display:flex; align-items:center; justify-content:center; color:var(--muted); position:relative; }
  .lib-thumb img { width:100%; height:100%; object-fit:cover; }
  .lib-type-badge { position:absolute; top:9px; left:9px; padding:3px 9px; border-radius:99px; font-size:.67rem; font-weight:700; display:flex; align-items:center; gap:4px; }
  .badge-audio { background:#68b87d; color:white; }
  .badge-video { background:#a0cb7b; color:#1e3a2f; }
  .badge-dokus { background:#efe454; color:#3a3000; }
  .lib-play-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(30,60,35,.2); }
  .lib-play-btn { width:40px; height:40px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.2); }
  .lib-card-body { padding:12px; border-left-width:3px; border-left-style:solid; }
  .lib-card-title { font-weight:700; font-size:.88rem; margin-bottom:3px; color:var(--text); }
  .lib-card-desc { font-size:.76rem; color:var(--muted); line-height:1.5; }
  .lib-card-meta { display:flex; justify-content:space-between; align-items:center; margin-top:9px; font-size:.71rem; color:var(--muted); }

  /* Upload zone */
  .upload-zone { border:2px dashed var(--border2); border-radius:var(--radius); padding:28px; text-align:center; cursor:pointer; transition:all .2s; color:var(--muted); }
  .upload-zone:hover,.upload-zone.drag { border-color:var(--teal); background:var(--teal-pale); color:var(--teal-dark); }
  .upload-zone p { font-size:.86rem; margin-top:8px; }
  .upload-zone span { font-size:.74rem; color:var(--muted); display:block; margin-top:3px; }


  /* ── DOODLE / TERMINFINDUNG ── */
  .doodle-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:12px;border-left:4px solid var(--teal);transition:transform .15s}

  .doodle-card.closed{border-left-color:var(--border2);opacity:.7}
  .doodle-title{font-family:'Manuale',serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:6px}
  .doodle-meta{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
  .doodle-recipients{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .recipient-chip{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--sage-pale);color:var(--text)}
  .doodle-actions{display:flex;gap:7px;flex-wrap:wrap}

  .coachee-check-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;margin-bottom:5px}

  .coachee-check-row.sel{background:var(--teal-pale);border-color:var(--teal)}

  /* vote rows coachee */
  .vote-row-c{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;margin-bottom:6px;background:var(--surface2);border:1.5px solid transparent;transition:all .15s}

  .vbtn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-size:.95rem;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  .vbtn.yes.on{background:var(--teal);border-color:var(--teal-dark)}
  .vbtn.no.on{background:var(--danger);border-color:#a03020;color:white}
  /* event cards */
  .event-card-row{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;display:flex;transition:transform .15s}

function LoginPage() {
  const [mode,setMode] = useState("login");
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);

  const doLogin = () => {
    if(!email||!pw){setError("Bitte E-Mail und Passwort eingeben.");return;}
    setLoading(true);setError("");
    const fbAuth = window._fb?.auth||window.firebase?.auth();
    if(!fbAuth){setError("App wird geladen... kurz warten.");setLoading(false);return;}
    const p = mode==="login"
      ? fbAuth.signInWithEmailAndPassword(email,pw)
      : fbAuth.createUserWithEmailAndPassword(email,pw);
    p.catch(e=>{
      const msgs={"auth/user-not-found":"E-Mail nicht gefunden.","auth/wrong-password":"Falsches Passwort.","auth/invalid-credential":"E-Mail oder Passwort falsch.","auth/email-already-in-use":"E-Mail bereits registriert.","auth/weak-password":"Passwort zu kurz (min. 6 Zeichen).","auth/invalid-email":"Ungültige E-Mail."};
      setError(msgs[e.code]||"Fehler: "+e.message);
      setLoading(false);
    });
  };

  const doGoogle = () => {
    setLoading(true);setError("");
    const fbAuth=window._fb?.auth||window.firebase?.auth();
    const prov=window._fb?.googleProvider||new window.firebase.auth.GoogleAuthProvider();
    if(!fbAuth){setError("App wird geladen...");setLoading(false);return;}
    const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const p=isMobile?fbAuth.signInWithRedirect(prov):fbAuth.signInWithPopup(prov);
    if(p&&p.catch) p.catch(e=>{if(e.code!=="auth/popup-closed-by-user")setError("Google fehlgeschlagen: "+e.message);setLoading(false);});
  };

  const doReset = () => {
    if(!email){setError("Bitte zuerst E-Mail eingeben.");return;}
    const fbAuth=window._fb?.auth||window.firebase?.auth();
    if(fbAuth) fbAuth.sendPasswordResetEmail(email).then(()=>alert("Reset-E-Mail gesendet an: "+email)).catch(e=>setError(e.message));
  };

  return html`
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">
          <${Logo} size=${64}/>
          <div style=${{textAlign:"center"}}>
            <div style=${{fontFamily:"'Manuale',serif",fontSize:"1.3rem",fontWeight:700,color:"var(--text)"}}>Raum für Selbstwirksamkeit</div>
            <div style=${{marginTop:6}}><span class="login-badge">Admin-Portal</span></div>
          </div>
        </div>

        ${error&&html`<div style=${{background:"#fff0ef",border:"1px solid #f5c0bc",borderRadius:10,padding:"10px 14px",fontSize:".83rem",color:"var(--danger)",marginBottom:14}}>${error}</div>`}

        <button onClick=${doGoogle} disabled=${loading}
          style=${{width:"100%",padding:"11px",borderRadius:10,border:"1.5px solid var(--border)",background:"var(--surface)",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:".88rem",color:"var(--text)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:14}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Mit Google anmelden
        </button>

        <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style=${{flex:1,height:1,background:"var(--border)"}}/>
          <span style=${{fontSize:".74rem",color:"var(--muted)"}}>oder</span>
          <div style=${{flex:1,height:1,background:"var(--border)"}}/>
        </div>

        <div class="form-row"><label class="label">E-Mail</label><input class="input" type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="deine@email.ch"/></div>
        <div class="form-row"><label class="label">Passwort</label><input class="input" type="password" value=${pw} onInput=${e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown=${e=>e.key==="Enter"&&doLogin()}/></div>

        <button onClick=${doLogin} disabled=${loading}
          style=${{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"var(--teal)",color:"white",cursor:"pointer",fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:".92rem",opacity:loading?.6:1}}>
          ${loading?"Wird geladen…":mode==="login"?"Anmelden":"Registrieren"}
        </button>

        <div style=${{display:"flex",justifyContent:"space-between",marginTop:12,fontSize:".78rem"}}>
          <button onClick=${()=>{setMode(mode==="login"?"register":"login");setError("");}} style=${{background:"none",border:"none",cursor:"pointer",color:"var(--teal-dark)",fontWeight:700,fontFamily:"'Exo 2',sans-serif",fontSize:".78rem"}}>
            ${mode==="login"?"Konto erstellen":"Anmelden"}
          </button>
          ${mode==="login"&&html`<button onClick=${doReset} style=${{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontFamily:"'Exo 2',sans-serif",fontSize:".78rem",textDecoration:"underline"}}>Passwort vergessen?</button>`}
        </div>
      </div>
    </div>`;
}

function QuoteEditor() {
  const [text,setText] = useState("");
  const [author,setAuthor] = useState("");
  const [saved,setSaved] = useState(false);
  const [current,setCurrent] = useState(null);

  useEffect(()=>{
    const fbDb=window._fb?.db;
    if(!fbDb) return;
    fbDb.collection("settings").doc("quote").get()
      .then(doc=>{ if(doc.exists){ const d=doc.data(); setText(d.text||""); setAuthor(d.author||""); setCurrent(d); }})
      .catch(()=>{});
  },[]);

  const saveQuote = () => {
    if(!text.trim()) return;
    const fbDb=window._fb?.db;
    if(fbDb){
      fbDb.collection("settings").doc("quote").set({text:text.trim(),author:author.trim()})
        .then(()=>{ setSaved(true); setTimeout(()=>setSaved(false),3000); })
        .catch(e=>alert("Fehler: "+e.message));
    }
  };

  return html`

function ChatPage({coachees,setCoachees}) {
  const [activeId,setActiveId] = useState(null);
  const [search,setSearch] = useState("");
  const [mobileView,setMobileView] = useState("list");
  const [mobileOpen,setMobileOpen] = useState(false);

  const filtered = coachees.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.topic.toLowerCase().includes(search.toLowerCase()));
  const active = coachees.find(c=>c.id===activeId);

    const selectCoachee = id => {
    setActiveId(id);
    setCoachees(cs=>cs.map(c=>c.id===id?{...c,unread:0}:c));
    setMobileOpen(true);
  };;

  const sendMsg = (text, sender="Diana") => {
    if(!text.trim()||!active) return;
    const msg={id:Date.now(),from:"admin",sender:sender,text:text.trim(),time:nowTime(),date:"Heute",seen:false};
    setCoachees(cs=>cs.map(c=>c.id===activeId?{...c,messages:[...(c.messages||[]),msg],lastTime:nowTime()}:c));
  };

  const sendImg = (dataUrl, isVideo=false, sender="Diana") => {
    if(!active) return;
    const msg={id:Date.now(),from:"admin",sender,imgSrc:dataUrl,isVideo,text:"",time:nowTime(),date:"Heute"};
    setCoachees(cs=>cs.map(c=>c.id===activeId?{...c,messages:[...(c.messages||[]),msg],lastTime:nowTime()}:c));
  };
  const sendFile = (file, sender="Diana") => {
    if(!active) return;
    const msg={id:Date.now(),from:"admin",sender,file,text:"",time:nowTime(),date:"Heute"};
    setCoachees(cs=>cs.map(c=>c.id===activeId?{...c,messages:[...(c.messages||[]),msg],lastTime:nowTime()}:c));
  };

  return html`
    <div style=${{display:"flex",flexDirection:"column",width:"100%",flex:1,minHeight:0,overflow:"hidden"}}>
      ${!mobileOpen
        ? html`
          <div style=${{display:"flex",flexDirection:"column",width:"100%",flex:1,minHeight:0,overflow:"hidden"}}>
            <div class="chat-list-header">
              <div style=${{display:"flex",alignItems:"center",gap:14,marginBottom:8}}>
                <${Logo} size=${52}/>
                <div>
                  <div style=${{fontFamily:"'Manuale',serif",fontSize:"1.3rem",fontWeight:700,color:"var(--text)"}}>Nachrichten</div>
                  <div style=${{fontSize:".88rem",color:"var(--muted)",marginTop:2}}>Gespräche mit Coachees</div>
                </div>
              </div>
              <div class="search-wrap">
                <span class="search-icon"><${Ic} name="search" size=${14}/></span>
                <input class="search-input" value=${search} onInput=${e=>setSearch(e.target.value)} placeholder="Coachee suchen…"/>
              </div>
            </div>
            <div class="conv-list" style=${{flex:1,overflowY:"auto"}}>
              ${filtered.map(c=>html`
                <div key=${c.id} class=${"conv-row"+(activeId===c.id?" active":"")} onClick=${()=>selectCoachee(c.id)}>
                  <div class="conv-avatar" style=${{background:c.color}}>
                    ${c.photo?html`<img src=${c.photo} alt=""/>`:c.initials}
                    ${c.online&&html`<span class="online-dot"/>`}
                  </div>
                  <div class="conv-info">
                    <div class="conv-name">${c.name}</div>
                    <div class="conv-preview">${c.messages?.length?c.messages.at(-1).from==="admin"?"Du: "+c.messages.at(-1).text:c.messages.at(-1).text:c.topic}</div>
                  </div>
                  <div class="conv-meta">
                    <span class="conv-time">${c.lastTime}</span>
                    ${(c.unread||0)>0&&html`<span class="conv-unread">${c.unread}</span>`}
                  </div>
                </div>`)}
            </div>
          </div>`
        : html`
          <div style=${{display:"flex",flexDirection:"column",width:"100%",flex:1,minHeight:0,overflow:"hidden"}}>
            ${active
              ? html`<${ChatWindow} coachee=${active} onSend=${sendMsg} onSendImg=${sendImg} onSendFile=${sendFile} setLightbox=${()=>{}} onBack=${()=>setMobileOpen(false)} mobileOpen=${true}/>`
              : html`<div style=${{display:"flex",alignItems:"center",justifyContent:"center",flex:1,flexDirection:"column",gap:12,color:"var(--muted)"}}>
                  <${Logo} size=${60}/>

                </div>`}
          </div>`}
    </div>
  `
}

function ChatWindow({coachee,onSend,onSendImg,onSendFile,onBack,mobileOpen}) {
  const [input,setInput]         = useState("");
  const [sender,setSender]         = useState("Diana");
  const [lightbox,setLightbox]   = useState(null);
  const [videoLightbox,setVideoLightbox] = useState(null);
  const [recording,setRecording]   = useState(false);
  const [fileViewer,setFileViewer]   = useState(null);
  const [showCamMenu,setShowCamMenu] = useState(false);
  const bottomRef  = useRef(null);
  const textRef    = useRef(null);
  const chatImgRef = useRef(null);
  const attachRef  = useRef(null);
  const mediaRecRef = useRef(null);
  const chunksRef  = useRef([]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[coachee.messages.length]);

  const groups = coachee.messages.reduce((acc,msg)=>{
    const d=msg.date||"Heute"; if(!acc[d])acc[d]=[]; acc[d].push(msg); return acc;
  },{});

  const handleSend = () => { if(!input.trim())return; onSend(input); setInput(""); };
  const handleKey  = e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();} };

  const handleChatImg = async e => {
    const files = e.target.files; if(!files||!files[0])return;
    for(let i=0;i<files.length;i++){
      const f=files[i];
      if(f.type.startsWith("video/")) {
        // For video: store blob URL directly (iOS can play blob URLs)
        const blobUrl = URL.createObjectURL(f);
        onSendImg(blobUrl, true);
      } else {
        onSendImg(await readFile(f), false);
      }
    }
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),50);
  };

  const handleAttach = async e => {
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{ onSendFile({url:ev.target.result,name:f.name,type:f.type,size:f.size,isAudio:false}); };
    r.readAsDataURL(f); e.target.value="";
  };

  const startRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream);
      mediaRecRef.current = mr; chunksRef.current = [];
      mr.ondataavailable = ev => chunksRef.current.push(ev.data);
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current,{type:"audio/webm"});
        const rdr = new FileReader();
        rdr.onload = ev2 => {
          onSendFile({url:ev2.target.result,name:"Sprachmemo.webm",type:"audio/webm",isAudio:true});
        };
        rdr.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mr.start(); setRecording(true);
    } catch(err) { alert("Mikrofon-Zugriff nicht möglich."); }
  };

  const stopRecording = () => {
    if(mediaRecRef.current&&recording){ mediaRecRef.current.stop(); setRecording(false); }
  };

  const openFile = file => {
    try {
      const arr=file.url.split(","); const mime=arr[0].match(/:(.*?);/)[1];
      const bstr=atob(arr[1]); let n=bstr.length; const u8=new Uint8Array(n);
      while(n--)u8[n]=bstr.charCodeAt(n);
      const blob=new Blob([u8],{type:mime});
      const blobUrl=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=blobUrl; a.target="_blank"; a.rel="noopener";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(blobUrl),30000);
    } catch(e){ window.open(file.url,"_blank"); }
  };

  return html`
    <div class="chat-area">
      <div class="chat-topbar" style=${{padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick=${onBack} style=${{background:"none",border:"none",cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px 0 0",color:"var(--text)"}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="ct-av" style=${{background:coachee.color,position:"relative",flexShrink:0}}>
          ${coachee.photo?html`<img src=${coachee.photo} alt=""/>`:coachee.initials}
          ${coachee.online&&html`<span class="online-dot" style=${{position:"absolute",bottom:0,right:0}}/>`}
        </div>
        <div style=${{flex:1,minWidth:0}}>
          <div class="ct-name">${coachee.name}</div>
          <div class="ct-status">
            <span class=${"status-dot"+(coachee.online?"":" off")}/>
            ${coachee.online?"Online":"Zuletzt: "+coachee.lastTime} · ${coachee.topic}
          </div>
        </div>
      </div>

      <div class="messages" ref=${bottomRef}>
        ${Object.entries(groups).map(([date,msgs])=>html`
          <div key=${date}>
            <div class="date-divider">${date}</div>
            ${msgs.map((msg,i)=>{
              const isOut = msg.from==="admin";
              const sender = msg.sender||"Diana";
              const prevSame = i>0&&msgs[i-1].from===msg.from&&(msgs[i-1].sender||"Diana")===sender;
              const avatarColor = sender==="Rico" ? "#a0cb7b" : "#68b87d";
              const initial = sender[0];
              return html`
                <div key=${msg.id} class=${"msg-row "+(isOut?"out":"in")} style=${{marginBottom:prevSame?1:8,alignItems:"flex-end"}}>
                  ${!isOut&&html`<div style=${{width:28,height:28,borderRadius:"50%",flexShrink:0,
                    background:prevSame?"transparent":avatarColor,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    marginRight:6,marginBottom:2,fontSize:".72rem",fontWeight:700,
                    color:"white"}}>${prevSame?"":initial}</div>`}
                  <div class="msg-bubble-wrap">
                    ${!isOut&&!prevSame&&html`<div style=${{fontSize:".67rem",fontWeight:700,
                      color:avatarColor,marginBottom:2,marginLeft:2}}>${sender}</div>`}
                    <div class="msg-bubble">
                      ${msg.imgSrc&&!msg.isVideo&&html`<div class="msg-img-wrap"><img src=${msg.imgSrc} class="msg-img" alt="Foto" onClick=${()=>setLightbox(msg.imgSrc)}/></div>`}
                      ${msg.imgSrc&&msg.isVideo&&html`<div class="msg-img-wrap">
                        <div onClick=${()=>setVideoLightbox(msg.imgSrc)}
                          style=${{width:220,borderRadius:12,overflow:"hidden",background:"var(--forest)",
                            cursor:"pointer",display:"flex",alignItems:"center",gap:10,padding:"10px 12px"}}>
                          <div style=${{width:44,height:44,borderRadius:8,background:"rgba(255,255,255,.12)",
                            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7">
                              <polygon points="23 7 16 12 23 17 23 7"/>
                              <rect x="1" y="5" width="15" height="14" rx="2"/>
                            </svg>
                          </div>
                          <div style=${{flex:1,minWidth:0}}>
                            <div style=${{fontSize:".82rem",fontWeight:700,color:"white"}}>Video</div>
                            <div style=${{fontSize:".72rem",color:"rgba(255,255,255,.55)"}}>Tippen zum Abspielen</div>
                          </div>
                          <div style=${{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.15)",
                            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="white" stroke="none">
                              <polygon points="6,3 20,12 6,21"/>
                            </svg>
                          </div>
                        </div>
                      </div>`}
                      ${msg.file&&msg.file.isAudio&&html`
                        <div style=${{padding:"2px 0"}}>
                          <audio controls=${true} src=${msg.file.url}
                            style=${{height:34,maxWidth:220,borderRadius:20,display:"block"}}></audio>
                          <div style=${{fontSize:".68rem",opacity:.6,marginTop:3}}>Sprachmemo</div>
                        </div>`}
                      ${msg.file&&!msg.file.isAudio&&html`
                        <div onClick=${()=>openFile(msg.file)}
                          style=${{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
                            padding:"6px 10px",background:"rgba(255,255,255,.15)",borderRadius:8,minWidth:160}}>
                          <${Ic} name="file" size=${20} style=${{flexShrink:0,opacity:.8}}/>
                          <div style=${{minWidth:0}}>
                            <div style=${{fontSize:".8rem",fontWeight:700,overflow:"hidden",
                              textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}>${msg.file.name}</div>
                            <div style=${{fontSize:".68rem",opacity:.7}}>${(msg.file.type||"").split("/")[1]?.toUpperCase()||"Datei"}</div>
                          </div>
                          <${Ic} name="chevron" size=${14} style=${{flexShrink:0,opacity:.6}}/>
                        </div>`}
                      ${msg.text&&html`<span>${msg.text}</span>`}
                    </div>
                    <div class="msg-meta" style=${{justifyContent:isOut?"flex-end":"flex-start"}}>
                      <span class="msg-time-small">${msg.time}</span>
                      ${isOut&&msg.seen&&html`<span style=${{color:"var(--teal)",fontSize:".65rem"}}>✓✓</span>`}
                    </div>
                  </div>
                </div>`;
            })}
          </div>`)}
        <div ref=${bottomRef}/>
      </div>

      <div class="chat-input-area">
        <input ref=${chatImgRef} type="file" accept="image/*,video/*" capture="environment"
          style=${{display:"none"}} onChange=${handleChatImg}/>
        <input id="lib-pick" type="file" accept="image/*,video/*"
          style=${{display:"none"}} onChange=${handleChatImg}/>
        <input ref=${attachRef} type="file"
          accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,application/*"
          style=${{display:"none"}} onChange=${handleAttach}/>
        <button class="attach-btn" onClick=${()=>setShowCamMenu(true)}><${Ic} name="camera" size=${18}/></button>
        <button class="attach-btn" onClick=${()=>attachRef.current?.click()}><${Ic} name="attach" size=${18}/></button>
        <button class="attach-btn"
          onClick=${recording?stopRecording:startRecording}
          style=${{color:recording?"#e53e3e":"var(--muted)",position:"relative"}}>
          <${Ic} name=${recording?"stop":"mic"} size=${18}/>
          ${recording&&html`<span style=${{position:"absolute",top:1,right:1,width:7,height:7,
            borderRadius:"50%",background:"#e53e3e",border:"2px solid var(--surface)"}}/>`}
        </button>
        <textarea ref=${textRef} class="input-box" rows=${1} value=${input}
          onInput=${e=>setInput(e.target.value)} onKeyDown=${handleKey}
          onFocus=${()=>{
            setTimeout(()=>{
              if(textRef.current) textRef.current.scrollIntoView({block:"nearest",behavior:"smooth"});
              if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"});
            },350);
          }}
          placeholder=${"Nachricht an "+coachee.name.split(" ")[0]+"…"}/>
        <button class="send-btn" onClick=${handleSend} disabled=${!input.trim()}><${Ic} name="send" size=${17}/></button>
      </div>

      ${showCamMenu&&html`
        <div style=${{position:"fixed",inset:0,zIndex:99998,background:"rgba(0,0,0,.4)"}}
          onClick=${()=>setShowCamMenu(false)}>
          <div style=${{position:"fixed",bottom:0,left:0,right:0,background:"var(--surface)",
            borderRadius:"16px 16px 0 0",padding:"8px 0 32px",boxShadow:"0 -4px 24px rgba(0,0,0,.15)"}}
            onClick=${e=>e.stopPropagation()}>
            <div style=${{width:36,height:4,borderRadius:2,background:"var(--border)",margin:"0 auto 16px"}}/>
            ${[
              {label:"Foto oder Video aufnehmen", action:()=>{setShowCamMenu(false);chatImgRef.current?.click();},
                icon:html`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`},
              {label:"Aus Fotomediathek wählen", action:()=>{setShowCamMenu(false);document.getElementById("lib-pick")?.click();},
                icon:html`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},

      ${videoLightbox&&html`

          <div style=${{position:"relative",maxWidth:"95vw",maxHeight:"90vh"}}>
            <button onClick=${()=>setVideoLightbox(null)}

                display:"flex",alignItems:"center",justifyContent:"center",

              <${Ic} name="x" size=${16}/>

            <video src=${videoLightbox} controls=${true} autoplay=${true} playsinline=${true}
              style=${{maxWidth:"90vw",maxHeight:"80vh",borderRadius:12,display:"block"}}></video>

        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",

          <div style=${{width:"90vw",height:"82vh",background:"white",borderRadius:12,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"10px 14px",background:"#1e3a2f",flexShrink:0,gap:10}}>
              <div style=${{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1,overflow:"hidden"}}>

          </div>
        </div>`}
    </div>`;
}

function DoodlePage({doodles,setDoodles,coachees}) {
  const [showCreate,setShowCreate] = useState(false);
  const [showResults,setShowResults] = useState(null);
  const [showConfirmed,setShowConfirmed] = useState(false);
  const [newTitle,setNewTitle] = useState("");
  const [newDesc,setNewDesc] = useState("");
  const [newSlots,setNewSlots] = useState([]);
  const [newSlotDt,setNewSlotDt] = useState("");
  const [selRecip,setSelRecip] = useState([]);

  const defaultDt = () => { const d=new Date(); d.setDate(d.getDate()+1); d.setHours(10,0,0,0); return d.toISOString().slice(0,16); };

  const addSlot = () => {
    if(!newSlotDt) return;
    if(newSlots.includes(newSlotDt)) return;
    setNewSlots(s=>[...s,newSlotDt].sort());
    const d=new Date(newSlotDt); d.setHours(d.getHours()+2);
    setNewSlotDt(d.toISOString().slice(0,16));
  };

  const createDoodle = () => {
    if(!newTitle.trim()||newSlots.length<1) return;
    const nd={id:"d"+Date.now(),title:newTitle.trim(),desc:newDesc.trim()||"Bitte wähle die Zeiten die dir passen.",status:"open",recipients:[...selRecip],slots:newSlots.map(dt=>({dt,votes:{}}))};
    setShowCreate(false);setNewTitle("");setNewDesc("");setNewSlots([]);setSelRecip([]);
    setDoodles(ds=>[nd,...ds]);
    showToast("✓ Terminvorschlag erstellt");
  };

  const bestSlotIdx = d => {
    let best=-1,bestCount=-1;
    (d.slots||[]).forEach((s,i)=>{
      const yes=Object.values(s.votes||{}).filter(v=>v==="yes").length;
      if(yes>bestCount){bestCount=yes;best=i;}
    });
    return best;
  };

  const confirmSlot = did => {
    setDoodles(ds=>ds.map(x=>x.id===did?{...x,status:"closed"}:x));
    setShowResults(null);setShowConfirmed(true);
  };

  const resultDoodle = doodles.find(d=>d.id===showResults);

  return html`
    <div class="page">
      <div style=${{marginBottom:24,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
        <div style=${{display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
          <${Logo} size=${52}/>
          <div>
            <div style=${{fontFamily:"'Manuale',serif",fontSize:"1.3rem",fontWeight:700,color:"var(--text)"}}>Termine & Events</div>
            <div style=${{fontSize:".88rem",color:"var(--muted)",marginTop:2}}>Terminvorschläge koordinieren.</div>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onClick=${()=>{setNewSlotDt(defaultDt());setShowCreate(true);}}><${Ic} name="plus" size=${15}/> Neuer Doodle</button>
      </div>

      ${doodles.length===0&&html`<div style=${{textAlign:"center",padding:"48px",color:"var(--muted)"}}><p>Noch kein Terminvorschlag erstellt.</p></div>`}

      ${doodles.map(d=>{
        const votedCount=(d.recipients||[]).filter(rid=>(d.slots||[]).some(s=>s.votes?.[rid])).length;
        return html`
          <div key=${d.id} class=${"doodle-card"+(d.status==="closed"?" closed":"")}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div class="doodle-title">${d.title}</div>
              <span class=${"status-pill "+(d.status==="open"?"status-open":"status-closed")}>${d.status==="open"?"Offen":"Abgeschlossen"}</span>
            </div>
            <div class="doodle-meta">
              <span>${(d.slots||[]).length} Zeitvorschläge</span>
              <span>${votedCount}/${(d.recipients||[]).length} abgestimmt</span>
            </div>
            <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              ${(d.recipients||[]).map(rid=>{
                const c=coachees.find(x=>x.id===rid);if(!c)return null;
                return html`<span key=${rid} class="recipient-chip">${c.name}</span>`;
              })}
            </div>
            <div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>
              <button class="btn btn-sage btn-sm" onClick=${()=>setShowResults(d.id)}>Ergebnisse</button>
              ${d.status==="open"&&html`<button class="btn btn-ghost btn-sm" onClick=${()=>setDoodles(ds=>ds.map(x=>x.id===d.id?{...x,status:"closed"}:x))}>Schliessen</button>`}
              <button class="btn btn-danger btn-sm" onClick=${()=>setDoodles(ds=>ds.filter(x=>x.id!==d.id))}><${Ic} name="trash" size=${12}/></button>
            </div>
          </div>`;
      })}

      ${/* CREATE MODAL */showCreate&&html`
        <div class="overlay" onClick=${e=>{if(e.target===e.currentTarget)setShowCreate(false);}}>
          <div class="modal">
            <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}><h2 class="modal-title" style=${{marginBottom:0}}>Neuer Terminvorschlag</h2><button style=${{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",padding:4,borderRadius:8,display:"flex"}} onClick=${()=>{const o=document.querySelector(".overlay");if(o)o.click();}}><\${Ic} name="x" size=\${20}/></button></div>
            <div class="form-row"><label class="label">Titel</label><input class="input" value=${newTitle} onInput=${e=>setNewTitle(e.target.value)} placeholder="z.B. Coaching-Session April"/></div>
            <div class="form-row"><label class="label">Beschreibung (optional)</label><textarea class="textarea" rows=${2} value=${newDesc} onInput=${e=>setNewDesc(e.target.value)} placeholder="z.B. Wähle bitte 2–3 Zeiten die dir passen."/></div>
            <div class="form-row">
              <label class="label">Zeitvorschläge</label>
              ${newSlots.map(dt=>html`
                <div key=${dt} class="slot-item">
                  ${fmtDt(dt)}
                  <button style=${{background:"none",border:"none",cursor:"pointer",color:"var(--danger)",fontSize:"1rem"}} onClick=${()=>setNewSlots(s=>s.filter(x=>x!==dt))}>✕</button>
                </div>`)}
              <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
                <input class="input" type="datetime-local" value=${newSlotDt} onInput=${e=>setNewSlotDt(e.target.value)} style=${{flex:1}}/>
                <button class="btn btn-sage btn-sm" onClick=${addSlot}>+ Hinzufügen</button>
              </div>
            </div>
            <div class="form-row">
              <label class="label">Senden an (optional)</label>
              ${coachees.map(c=>html`
                <div key=${c.id} class=${"coachee-check"+(selRecip.includes(c.id)?" sel":"")} onClick=${()=>setSelRecip(r=>r.includes(c.id)?r.filter(x=>x!==c.id):[...r,c.id])}>
                  <input type="checkbox" checked=${selRecip.includes(c.id)} onClick=${e=>e.stopPropagation()} style=${{width:16,height:16,accentColor:"var(--teal)",cursor:"pointer"}}/>
                  <div style=${{width:28,height:28,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".68rem",fontWeight:700,color:"var(--forest)",flexShrink:0}}>${c.initials}</div>
                  <span style=${{fontSize:".88rem",fontWeight:600}}>${c.name}</span>
                </div>`)}
            </div>
            <div class="modal-actions">
              <button class="btn btn-ghost" onClick=${()=>setShowCreate(false)}>Abbrechen</button>
              <button class="btn btn-primary" onClick=${createDoodle} disabled=${!newTitle.trim()||newSlots.length<1}>Erstellen & Senden</button>
            </div>
          </div>
        </div>`}

      ${/* RESULTS MODAL */showResults&&resultDoodle&&html`
        <div class="overlay" onClick=${e=>{if(e.target===e.currentTarget)setShowResults(null);}}>
          <div class="modal">
            <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}><h2 class="modal-title" style=${{marginBottom:0}}>${resultDoodle.title} — Ergebnisse</h2><button style=${{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",padding:4,borderRadius:8,display:"flex"}} onClick=${()=>{const o=document.querySelector(".overlay");if(o)o.click();}}><\${Ic} name="x" size=\${20}/></button></div>
            ${(resultDoodle.slots||[]).map((s,i)=>{
              const best=bestSlotIdx(resultDoodle);
              const isBest=i===best&&Object.values(s.votes||{}).some(v=>v==="yes");
              return html`
                <div key=${i} class=${"vote-row"+(isBest?" best-row":"")}>
                  <div class="vote-dt">
                    ${fmtDt(s.dt)}
                    ${isBest&&html`<span class="best-badge">Bester Termin</span>`}
                  </div>
                  <div style=${{display:"flex",gap:4}}>
                    ${(resultDoodle.recipients||[]).map(rid=>{
                      const c=coachees.find(x=>x.id===rid);if(!c)return null;
                      const v=s.votes?.[rid];
                      return html`<div key=${rid} class=${"vote-chip "+(v==="yes"?"vc-yes":v==="no"?"vc-no":"vc-none")} title=${c.name}>${c.initials}</div>`;
                    })}
                  </div>
                  <span style=${{fontSize:".75rem",color:"var(--muted)",minWidth:40}}>
                    ${Object.values(s.votes||{}).filter(v=>v==="yes").length}/${(resultDoodle.recipients||[]).length} Ja
                  </span>
                </div>`;
            })}
            <div class="modal-actions">
              <button class="btn btn-ghost" onClick=${()=>setShowResults(null)}>Schliessen</button>
              <button class="btn btn-primary" onClick=${()=>confirmSlot(resultDoodle.id)}>✓ Termin bestätigen</button>
            </div>
          </div>
        </div>`}

      ${showConfirmed&&html`
        <div class="overlay" onClick=${()=>setShowConfirmed(false)}>
          <div class="modal" style=${{textAlign:"center",padding:"40px 28px"}}>
            <div style=${{fontSize:"2.5rem",marginBottom:12}}>🎉</div>
            <h2 style=${{fontFamily:"'Manuale',serif",fontSize:"1.2rem",color:"var(--forest)",marginBottom:10}}>Termin bestätigt!</h2>
            <p style=${{color:"var(--muted)",fontSize:".88rem",marginBottom:20}}>Die Coachees werden benachrichtigt.</p>
            <button class="btn btn-primary" onClick=${()=>setShowConfirmed(false)}>Fertig</button>
          </div>
        </div>`}
    </div>`;
}

function BreathOverlay({ onDone }) {
  const [screen, setScreen] = useState('intro');
  const overlayRef = useRef(null);
  const ballRef    = useRef(null);
  const rafRef     = useRef(null);

  const IN_MS=4000, OUT_MS=6000, CYCLE=10000, REPS=3;
  const SZ_MIN=100, SZ_MAX=200;
  const ease = t => -(Math.cos(Math.PI*t)-1)/2;

  const startExercise = () => setScreen('exercise');

  useEffect(()=>{
    if(screen!=='exercise') return;
    let startTime=null, finished=false;
    const frame = now => {
      if(!startTime) startTime=now;
      const elapsed=now-startTime;
      if(elapsed>=CYCLE*REPS){
        if(!finished){
          finished=true;
          cancelAnimationFrame(rafRef.current);
          const el = overlayRef.current;
          if(el){
            el.innerHTML = '';
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#0d2818;display:flex;flex-direction:column;align-items:center;justify-content:center;';
            const ball = document.createElement('div');
            ball.style.cssText = 'width:100px;height:100px;border-radius:50%;flex-shrink:0;margin-bottom:36px;background:radial-gradient(circle at 33% 28%,#e0fce8 0%,#a8e8b8 15%,#68c882 38%,#3ea860 62%,#1e7840 82%,#0a4822 100%);box-shadow:0 0 40px rgba(80,200,100,.2);';
            const w1 = document.createElement('div');
            w1.style.cssText = "font-family:'Exo 2',sans-serif;font-size:2rem;font-weight:300;color:rgba(255,255,255,.65);letter-spacing:6px;text-align:center;margin-bottom:20px;";
            w1.textContent = 'Ich bin.';
            const w2 = document.createElement('div');
            w2.style.cssText = "font-family:'Exo 2',sans-serif;font-size:.95rem;font-weight:300;color:rgba(255,255,255,.45);text-align:center;line-height:1.8;";
            w2.textContent = 'Nimm wahr, wie es sich anf\u00fchlt.';
            el.appendChild(ball);
            el.appendChild(w1);
            el.appendChild(w2);
          }
          setTimeout(()=>onDone(), 5000);
        }
        return;
      }
      const rep=Math.min(Math.floor(elapsed/CYCLE),REPS-1);
      const inCycle=elapsed%CYCLE;
      const isIn=inCycle<IN_MS;
      const t=isIn?inCycle/IN_MS:(inCycle-IN_MS)/OUT_MS;
      const sz=isIn?SZ_MIN+(SZ_MAX-SZ_MIN)*ease(t):SZ_MAX-(SZ_MAX-SZ_MIN)*ease(t);
      const b=ballRef.current;
      if(b){ b.style.width=sz+'px'; b.style.height=sz+'px'; }
      const lbl=document.getElementById('bh-rep-lbl');
      const ph=document.getElementById('bh-phase');
      const cnt=document.getElementById('bh-cnt');
      const totalSec=isIn?4:6;
      if(cnt)  cnt.textContent=Math.min(Math.floor(t*totalSec)+1,totalSec);
      if(ph)   ph.textContent=isIn?'Einatmen durch Nase':'Ausatmen durch Mund';
      if(lbl)  lbl.textContent='Atem\u00fcbung \u00b7 Runde '+(rep+1)+' von '+REPS;
      for(let i=0;i<REPS;i++){
        const d=document.getElementById('bh-dot-'+i);
        if(d) d.className='bh-dot'+(i<rep?' bh-done':i===rep?' bh-cur':'');
      }
      rafRef.current=requestAnimationFrame(frame);
    };
    rafRef.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(rafRef.current);
  },[screen]);

  if(screen==='intro') return html`
    <div class="breath-overlay bh-intro" style=${{display:'flex'}}>
      <div class="bh-intro-ball"></div>
      <div class="bh-ebene">Verlasse den Kopf,<br/>komm im Körper an.</div>
      <div class="bh-bereit">Bereit?</div>
      <div class="bh-start-btn" onClick=${startExercise}>Start</div>
      <div class="bh-skip-lnk" onClick=${onDone}>Überspringen</div>
    </div>`;

  return html`
    <div ref=${overlayRef} class="breath-overlay bh-exercise" style=${{display:'flex',position:'fixed'}}>
      <div class="bh-close-x" onClick=${onDone}>\u2715</div>
      <div id="bh-rep-lbl" class="bh-rep-lbl">Atemübung · Runde 1 von 3</div>
      <div class="bh-unit">
        <div class="bh-ball-wrap">
          <div class="bh-ball" ref=${ballRef} style=${{width:SZ_MIN+'px',height:SZ_MIN+'px'}}></div>
          <div id="bh-cnt" class="bh-count-inner">1</div>
        </div>
        <div id="bh-phase" class="bh-phase-word">Einatmen durch Nase</div>
      </div>
      <div class="bh-bottom">
        <div class="bh-dots">
          ${[0,1,2].map(i=>html`<div id=${'bh-dot-'+i} class=${'bh-dot'+(i===0?' bh-cur':'')}></div>`)}
        </div>
      </div>
    </div>`;
}

// ── ROOT ──
function Root() {
  const [user,setUser]     = useState(null);
  const [ready,setReady]   = useState(false);
  const [showBreath,setShowBreath] = useState(true);

  useEffect(()=>{
    let unsub;
    const tryAuth = async () => {
      await initFB();
      const auth = window._fb?.auth;
      if(!auth){ setReady(true); return; }
      unsub = auth.onAuthStateChanged(u=>{ setUser(u); setReady(true); });
    };
    tryAuth();
    return ()=>{ if(unsub) unsub(); };
  },[]);

  if(!ready) return html`
    <div style=${{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--sidebar-bg)",gap:16}}>
      <${Logo} size=${64}/>
      <div style=${{width:36,height:36,borderRadius:"50%",border:"3px solid rgba(255,255,255,.3)",borderTopColor:"#fff",animation:"spin 1s linear infinite"}}></div>
      <p style=${{color:"rgba(255,255,255,.5)",fontSize:".84rem"}}>Admin-Portal lädt…</p>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;

  if(!user) return html`<${LoginPage}/>`;

  if(showBreath) return html`<${BreathOverlay} onDone=${()=>setShowBreath(false)}/>`;

  return html`<${AdminApp} user=${user}/>`;
}

render(h(Root,null), document.getElementById('root'));
</script>
</body>
</html>
